<style>
:root{
  --bg:#060b14;--bg2:#0c1320;--card:#101928;--card2:#192233;
  --border:#1c2b3f;--border2:#243348;
  --teal:#2dd4bf;--teal2:#14b8a6;--teal-glow:rgba(45,212,191,0.15);--teal-glow2:rgba(45,212,191,0.08);
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--muted:#4a6080;--muted2:#637d9e;
  --text:#e2e8f0;--text2:#94a3b8;
  --fh:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:14px;--rs:8px;--sh:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
body{font-family:var(--fh);font-size:15px;line-height:1.5}
#app{max-width:460px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
select,input,button,textarea{font-family:inherit;font-size:15px}
select option{background:var(--bg2);color:var(--text)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--teal-glow)}50%{box-shadow:0 0 0 10px transparent}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

.loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,0.2);border-radius:50%;border-top-color:#000;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
.loader-light{border:2px solid rgba(255,255,255,0.2);border-top-color:#fff}

.fade-up{animation:fadeUp 0.38s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn 0.25s ease both}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.btn{width:100%;padding:17px;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.15s,transform 0.1s,background 0.2s;font-family:var(--fh)}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:var(--teal2)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-red{background:#ef444422;color:var(--red);border:1px solid #ef444430}
.btn:disabled{background:var(--card2);color:var(--muted);cursor:not-allowed;transform:none;opacity:1}
.inp{width:100%;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;transition:border-color 0.2s;font-family:var(--fh);padding-right:40px}
.inp:focus{outline:none;border-color:var(--teal)}
.inp::placeholder{color:var(--muted)}
.inp:disabled{opacity:0.4;cursor:not-allowed}
.lbl{display:block;font-size:11px;font-family:var(--fm);color:var(--muted2);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.back-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;font-weight:700;padding:4px 0;display:flex;align-items:center;gap:6px;transition:color 0.2s;font-family:var(--fh)}
.back-btn:hover{color:var(--text)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--fm);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tag-red{background:#ef444420;color:var(--red);border:1px solid #ef444430}
.tag-amber{background:#f59e0b20;color:var(--amber);border:1px solid #f59e0b30}
.tag-green{background:#22c55e20;color:var(--green);border:1px solid #22c55e30}
.tag-teal{background:var(--teal-glow2);color:var(--teal);border:1px solid rgba(45,212,191,0.25)}
.err-box{background:#ef444412;border:1px solid #ef444430;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#fca5a5;line-height:1.5}
.ok-box{background:#22c55e12;border:1px solid #22c55e30;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#86efac;line-height:1.5}

#topBar{position:sticky;top:0;z-index:100;background:rgba(6,11,20,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.token-badge{background:var(--teal-glow);border:1px solid rgba(45,212,191,0.35);border-radius:20px;padding:6px 13px;font-size:12px;font-family:var(--fm);color:var(--teal);cursor:pointer;white-space:nowrap;transition:background 0.2s}
.token-badge:hover{background:rgba(45,212,191,0.2)}

#fbBubble{position:fixed;bottom:24px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 20px rgba(45,212,191,0.35);transition:transform 0.2s;animation:pulse 3s ease infinite}
#fbBubble:hover{transform:scale(1.12)}
#fbBubble::after{content:"SEND US A MESSAGE";position:absolute;right:60px;top:15px;background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:700;color:var(--teal);white-space:nowrap;opacity:0;pointer-events:none;transition:0.2s cubic-bezier(.16,1,.3,1);transform:translateX(10px)}
#fbBubble:hover::after{opacity:1;transform:translateX(0)}

#fbPanel{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;z-index:300;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 32px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.16,1,.3,1)}
#fbPanel.open{transform:translateY(0)}
#fbOverlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.65);opacity:0;pointer-events:none;transition:opacity 0.3s}
#fbOverlay.open{opacity:1;pointer-events:all}

#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
.splash-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:44px 44px;opacity:0.25}
.logo-ring{width:80px;height:80px;border-radius:22px;background:var(--teal-glow);border:2px solid rgba(45,212,191,0.5);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;animation:pulse 2s ease infinite}
.splash-title{font-size:34px;font-weight:900;color:var(--teal);letter-spacing:-1.5px;margin-top:18px;font-family:var(--fh)}

.terminal{background:#01080a;border:1px solid #0c2a1a;border-radius:var(--r);padding:18px;font-family:var(--fm);font-size:12px;overflow-y:auto;line-height:2;flex:1;min-height:260px}
.term-line{display:flex;gap:8px;align-items:flex-start}
.term-prompt{color:#16522a;flex-shrink:0}
.term-text{color:#22c55e}
.term-text.done{color:#4ade80}
.term-cursor{display:inline-block;animation:blink 0.9s infinite;color:#22c55e}

.auth-tab{display:flex;background:var(--card);border-radius:var(--r);padding:4px;margin-bottom:22px}
.auth-tab button{flex:1;padding:11px;border:none;border-radius:var(--rs);background:transparent;color:var(--muted2);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--fh)}
.auth-tab button.active{background:var(--teal);color:#000}

.progress-bar{height:4px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--teal));border-radius:4px;transition:width 0.4s ease}

.check-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color 0.2s,background 0.2s}
.check-card.pass{border-color:rgba(34,197,94,0.45)!important;background:rgba(34,197,94,0.04)!important}
.check-card.fail{border-color:rgba(239,68,68,0.45)!important;background:rgba(239,68,68,0.04)!important}
.check-btn{padding:14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg2);color:var(--muted2);font-weight:800;font-size:14px;cursor:pointer;width:100%;transition:all 0.18s;font-family:var(--fh);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.check-btn:active{transform:scale(0.96)}
.check-btn.pass-active{background:var(--green)!important;border-color:var(--green)!important;color:#000!important}
.check-btn.fail-active{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}

.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:24px 20px 44px;width:100%;max-width:460px;animation:slideUp 0.35s cubic-bezier(.16,1,.3,1)}
.pack-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}
.pack-card:hover{border-color:var(--teal)}
.pack-card.featured{border-color:var(--teal);background:var(--teal-glow2)}
.popular-badge{position:absolute;top:-10px;right:16px;background:var(--teal);color:#000;font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px;font-family:var(--fm);letter-spacing:0.5px}

.section-title{font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted2);font-size:16px;cursor:pointer;}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-grid"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">

  <button class="btn btn-primary" onclick="submitFeedback()" id="fbBtn">Send Message →</button>
  <div id="fbStatus" style="text-align:center;font-size:13px;color:var(--muted2);margin-top:10px;height:20px"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURATION — PASTE YOUR GAS URL BELOW
// ═══════════════════════════════════════════════════
const CFG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbwrD8eXkPmLRGeLSZ0cQNayDoErSMjFrvhfWaNMduqC3upKJhRbPJ7sEYeJED-fcWg/exec',
  GUMROAD: {
    PACK10:  'https://carzmood.gumroad.com/l/tokens10',
    PACK50:  'https://carzmood.gumroad.com/l/tokens50',
    PACK200: 'https://carzmood.gumroad.com/l/tokens200',
  },
  FREE_TOKENS: 3
};

const COUNTRIES = ["USA", "Canada", "UK", "Australia", "Other"];
const MAKES = ["ACURA","ALFA ROMEO","AUDI","BMW","BUICK","CADILLAC","CHEVROLET","CHRYSLER","DODGE","FORD","GMC","HONDA","HYUNDAI","INFINITI","JAGUAR","JEEP","KIA","LAND ROVER","LEXUS","LINCOLN","MAZDA","MERCEDES-BENZ","MINI","MITSUBISHI","NISSAN","PONTIAC","PORSCHE","RAM","SATURN","SCION","SUBARU","SUZUKI","TESLA","TOYOTA","VOLKSWAGEN","VOLVO"];
const YEARS = Array.from({length:40},(_,i)=>2026-i);

// ═══════════════════════════════════════════════════
// KNOWLEDGE BASE — Fallback & Static Diagnostics
// ═══════════════════════════════════════════════════
const KB = {
  TOYOTA:{ _:['Inspect timing chain/belt service records','Check valve cover gasket for oil seeps'] },
  HONDA:{ _:['Honda ATF must be pink — dark fluid = neglected transmission','Listen for VTEC engagement — should be smooth'] },
  FORD:{ _:['Check rust on cab corners, frame, rockers','Test SYNC/infotainment thoroughly — glitches common'] },
  CHEVROLET:{ _:['⚠️ Check AFM/DoD lifter tick on V8 engines — common on 5.3L and 6.2L','Inspect frame and undercarriage for rust'] },
  NISSAN:{ _:['🚨 CVT WARNING: Nissan/Jatco CVTs have very high documented failure rates. Test aggressively.'] },
  BMW:{ _:['⚠️ Maintenance costs are 2–4× higher than Japanese cars. Budget $2,000+/year in running costs.','⚠️ Electric water pump and thermostat failures are common and critical.'] }
};

// Universal checklist items — Ghost History Protocol Added
const UNIVERSAL = [
  {id:'u1',critical:true,cat:'Legal',label:'TITLE: Verify it is CLEAN. Reject any Salvage, Rebuilt, Flood, Junk, or Lemon-law buyback title. Ask to see the physical document.'},
  {id:'u2',critical:true,cat:'Legal',label:'VIN MATCH: Check VIN on the dashboard (driver side), door jamb sticker, AND the title document. All three must be identical.'},
  {id:'u3',critical:false,cat:'Cold Start',label:'COLD START: Start the engine cold (not warmed up). Listen for 2 minutes for ticking, knocking, rattling, or misfires.'},
  {id:'u4',critical:true,cat:'Ghost Protocol',label:'RUST & FRAME CAMOUFLAGE: Is there evidence of fresh Oil/Lanolin/Black spray paint on the chassis? (If "Yes" and in a Rust-Belt state: Flag as Frame Integrity Risk — they are hiding rot).'},
  {id:'u5',critical:false,cat:'Ghost Protocol',label:'MAINTENANCE AUDIT: Are there physical service records for major component replacements (timing belt, transmission service, water pump)? Demand to see them.'},
  {id:'u6',critical:false,cat:'Engine Oil',label:'OIL CHECK: Pull the dipstick. Oil should be amber/brown — never black. MILKY or foamy oil = coolant mixing with oil = blown head gasket = very expensive.'},
  {id:'u7',critical:true,cat:'Transmission',label:'TRANSMISSION DRIVE TEST: Accelerate from 0 to 50 mph on an empty road. Must be smooth with ZERO hesitation, shudder, slip, jerk, or delay between shifts.'},
  {id:'u8',critical:false,cat:'Electronics',label:'ALL ELECTRONICS: Test every window, door lock, headlight, wiper, backup camera, infotainment, and Bluetooth. Note every warning light on the dashboard.'},
];

// Repair cost lookup by keyword
function getRepairCost(label) {
  const l = label.toLowerCase();
  if (l.includes('head gasket')) return {label:'Head Gasket',min:1200,max:2800};
  if (l.includes('timing chain')||l.includes('timing belt')) return {label:'Timing Chain/Belt',min:800,max:2000};
  if (l.includes('cvt')) return {label:'CVT Replacement',min:3500,max:8000};
  if (l.includes('transmission')||l.includes('gearbox')) return {label:'Transmission Rebuild/Replace',min:2500,max:8000};
  if (l.includes('engine')||l.includes('motor')) return {label:'Engine Repair',min:1500,max:8000};
  if (l.includes('rust')||l.includes('frame rust')) return {label:'Rust/Frame Repair',min:500,max:5000};
  return {label:'General Repair',min:500,max:1500};
}

// ═══════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════
const TERM_LINES = [
  "> [ORACLE] PINGING NATIONAL SAFETY DATABASES...",
  "> [ORACLE] OFFICIAL RECALL STATUS RETRIEVED...",
  "> [ORACLE] INTERCEPTING MARKET AUCTION DATA...",
  "> [ORACLE] CALCULATING MECHANICAL LIABILITY OFFSETS...",
  "> [ORACLE] FINALIZING NEGOTIATION SCRIPT..."
];

let S = {
  phase:'splash', authMode:'login', authSub:'main',
  user:null, car:{year:'',make:'',model:'',country:'USA'},
  oracleData: { recalls:[], marketDelta:null },
  checklist:[], answers:{}, verdict:null,
  termLines:[], authErr:'', authOk:'', authLoading:false,
  showTokenModal:false, acctSub:'main', acctErr:'', acctOk:''
};

const $  = id => document.getElementById(id);
const esc = s => encodeURIComponent(s||'');

async function hashPass(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('CARZ2025_'+p));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function getUserIP() {
  try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; }
  catch { return 'unknown'; }
}

async function autoDetectCountry() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if(d.country_name) {
      if(COUNTRIES.includes(d.country_name)) return d.country_name;
      if(d.country_code === 'US') return 'USA';
      if(d.country_code === 'GB') return 'UK';
      if(d.country_code === 'CA') return 'Canada';
      if(d.country_code === 'AU') return 'Australia';
    }
  } catch(e) {}
  return 'USA';
}

async function gasPost(data) {
  try {
    const r = await fetch(CFG.GAS_URL, {method:'POST', body:JSON.stringify(data)});
    return await r.json();
  } catch(e) { return {ok:false, error:'Network error — check your connection'}; }
}

function togglePwd(id) {
  const el = $(id);
  if(el) el.type = el.type === 'password' ? 'text' : 'password';
}

// ═══════════════════════════════════════════════════
// AUTH LOGIC
// ═══════════════════════════════════════════════════
function markDevice(email) { localStorage.setItem('cm_dev_'+btoa(email), '1'); }

async function handleAuth() {
  const email = ($('authEmail')?.value||'').trim().toLowerCase();
  const pass  = ($('authPass')?.value||'');
  S.authErr = ''; S.authOk = '';
  if (!email || !pass) { S.authErr='Fill in all fields.'; render(); return; }
  if (S.authMode==='signup' && pass!==($('authPass2')?.value||'')) { S.authErr='Passwords do not match.'; render(); return; }
  if (pass.length < 6) { S.authErr='Password must be at least 6 characters.'; render(); return; }

  S.authLoading = true; render();
  const hash = await hashPass(pass);
  const ip   = await getUserIP();
  const res  = await gasPost({action:S.authMode, email, hash, ip});
  S.authLoading = false;

  if (!res.ok) { S.authErr = res.error||'Authentication failed.'; render(); return; }

  if (S.authMode === 'login') {
    S._pending = {email, hash, tokens:res.tokens, joined:res.joined||''};
    S.authLoading = true; render();
    const otpRes = await gasPost({action:'sendOTP', email, type:'verify'});
    S.authLoading = false;
    if (!otpRes.ok) { S.authErr='Could not send verification email: '+(otpRes.error||''); render(); return; }
    S.phase = 'verify2fa'; render();
    return;
  }

  S.user = {email, hash, tokens:res.tokens, joined:res.joined||''};
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  markDevice(email);
  S.car.country = await autoDetectCountry();
  S.phase = 'home'; render();
}

async function handle2FA() {
  const otp = ($('otpInput')?.value||'').trim();
  if (!otp||otp.length!==6) { S.authErr='Enter the 6-digit code.'; render(); return; }
  S.authLoading = true; render();
  const res = await gasPost({action:'verifyOTP', email:S._pending.email, otp});
  S.authLoading = false;
  if (!res.ok) { S.authErr = res.error||'Invalid code.'; render(); return; }
  S.user = S._pending;
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  S._pending = null;
  S.car.country = await autoDetectCountry();
  S.phase = 'home'; render();
}

// ═══════════════════════════════════════════════════
// CORE ANALYSIS LOGIC
// ═══════════════════════════════════════════════════
async function startAnalysis() {
  if (!S.car.year||!S.car.make||!S.car.model) { alert('Please fill in all vehicle fields.'); return; }
  if (S.user.tokens<=0) { S.showTokenModal=true; render(); return; }

  S.phase='loading'; S.termLines=[]; S.answers={}; render();

  // Terminal Delay (Exact 3.5 seconds prestige simulation)
  let ti=0;
  const termTimer = setInterval(()=>{
    if (ti<TERM_LINES.length) {
      S.termLines.push(TERM_LINES[ti++]);
      const tb=$('termBox'); if(tb){tb.innerHTML=buildTermHTML();tb.scrollTop=tb.scrollHeight;}
    }
  }, 700);

  try {
    // Ping GAS Backend for Global Forensic Analysis
    const reqData = {
      action: 'runGlobalForensicAnalysis',
      email: S.user.email,
      hash: S.user.hash,
      country: S.car.country,
      car: S.car
    };
    
    const res = await gasPost(reqData);
    
    if (!res.ok) { clearInterval(termTimer); S.showTokenModal=true; S.phase='home'; render(); return; }
    
    S.user.tokens = res.tokens; localStorage.setItem('cm_user',JSON.stringify(S.user));
    S.oracleData = { recalls: res.govData?.recalls || [], marketDelta: res.marketDelta };

    buildChecklist();

    const elapsed = S.termLines.length * 700;
    const wait    = Math.max(0, 3500 - elapsed);
    setTimeout(()=>{ clearInterval(termTimer); S.phase='checklist'; render(); }, wait);

  } catch(err) {
    clearInterval(termTimer);
    S.termLines.push('> [ORACLE] CONNECTION ISSUE — ENGAGING OFFLINE FALLBACK...');
    buildChecklist();
    setTimeout(()=>{ S.phase='checklist'; render(); }, 1500);
  }
}

function buildChecklist() {
  let items = [...UNIVERSAL];

  if (S.oracleData.recalls && S.oracleData.recalls.length>0) {
    items.splice(2,0,{
      id:'recall1', critical:true, cat:'Federal Safety Alert ⚠️',
      badge:`${S.oracleData.recalls.length} Open Government Recall${S.oracleData.recalls.length>1?'s':''}`,
      label:`OFFICIAL RECALL: ${S.oracleData.recalls[0].Component||'Safety issue'} — ${(S.oracleData.recalls[0].Summary||'Confirm ALL recalls have been completed by a dealer').substring(0,120)}...`
    });
  }

  S.checklist = items.map((item,i)=>({...item, id:item.id||'i'+i}));
}

function calcVerdict() {
  const fails = Object.values(S.answers).filter(v=>v==='fail').length;
  const critFails = S.checklist.filter(i=>i.critical&&S.answers[i.id]==='fail').length;
  const failedItems = S.checklist.filter(i=>S.answers[i.id]==='fail');
  
  // Mechanical Integrity Index Math
  let CI = 100 - (fails * 8) - (critFails * 25);
  
  // Confidence Index drop below 40% if active recall exists
  const hasActiveRecall = S.oracleData.recalls && S.oracleData.recalls.length > 0;
  if (hasActiveRecall) { CI = Math.min(CI, 39); }
  if (CI < 0) CI = 0;

  S.verdict = { 
    score: CI, 
    buy: CI >= 78 && critFails === 0, 
    neg: CI >= 40 && critFails <= 1, 
    fails, 
    critFails, 
    failedItems,
    hasActiveRecall
  };
  S.phase='verdict'; render();
}

function handleCheckAnswer(itemId, val) {
  S.answers[itemId] = val;
  const card = document.querySelector(`.check-card[data-id="${itemId}"]`);
  if (card) {
    card.classList.remove('pass','fail');
    if (val) card.classList.add(val);
    card.querySelectorAll('.check-btn').forEach(b => {
      b.classList.remove('pass-active','fail-active');
      if (b.dataset.val === val) b.classList.add(val === 'pass' ? 'pass-active' : 'fail-active');
    });
  }
  const done = Object.keys(S.answers).length;
  const total = S.checklist.length;
  const pct = Math.round(done/total*100)||0;
  const ctr = $('checkCounter'); if (ctr) ctr.textContent = `${done}/${total} checked`;
  const pctEl = $('checkPct'); if (pctEl) pctEl.textContent = `${pct}%`;
  const fill = $('progressFill'); if (fill) fill.style.width = pct+'%';
  const verdBtn = $('verdictBtn');
  if (verdBtn) {
    if (done === total) {
      verdBtn.disabled = false; verdBtn.className = 'btn btn-primary'; verdBtn.textContent = 'GENERATE INSPECTION REPORT →';
    } else {
      verdBtn.disabled = true; verdBtn.className = 'btn'; verdBtn.textContent = `Complete ${total-done} remaining checks`;
    }
  }
}

// RENDER ENGINE
// ═══════════════════════════════════════════════════
function render() {
  const a = $('app');
  $('fbBubble').style.display = (['splash','auth','verify2fa'].includes(S.phase))?'none':'flex';
  switch(S.phase) {
    case 'auth':       a.innerHTML = renderAuth();       break;
    case 'verify2fa':  a.innerHTML = renderVerify2FA();  break;
    case 'home':       a.innerHTML = renderHome();       break;
    case 'input':      a.innerHTML = renderInput();      break;
    case 'loading':    a.innerHTML = renderLoading();    break;
    case 'checklist':  a.innerHTML = renderChecklist();  break;
    case 'verdict':    a.innerHTML = renderVerdict();    break;
  }
  const mo = document.querySelector('.modal-overlay'); if(mo) mo.remove();
  if(S.showTokenModal) renderTokenModal();
}

  return `<div class="fade-up">
    <div id="topBar">

async function submitFeedback(){
  const msg=$('fbText').value; if(!msg)return;
  const btn = $('fbBtn');
  btn.innerHTML = `<div class="loader loader-light"></div> Sending...`;
  btn.disabled = true;
  await gasPost({action:'feedback', email:S.user?.email||'Anonymous', message:msg});
  $('fbStatus').textContent='✓ Sent! Thank you.'; $('fbText').value='';
  btn.innerHTML = `Send Message →`; btn.disabled = false;
  setTimeout(closeFeedback,2000);
}
