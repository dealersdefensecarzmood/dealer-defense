<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DealerDefense™ by CARZMOOD</title>
<meta name="description" content="Never get ripped off buying a used car. Real federal data. Real verdict.">
<meta name="theme-color" content="#060b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DealerDefense">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://gumroad.com/js/gumroad.js" async></script>
<style>
:root{
  --bg:#060b14;--bg2:#0c1320;--card:#101928;--card2:#192233;
  --border:#1c2b3f;--border2:#243348;
  --teal:#2dd4bf;--teal2:#14b8a6;--teal-glow:rgba(45,212,191,0.15);--teal-glow2:rgba(45,212,191,0.08);
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--muted:#4a6080;--muted2:#637d9e;
  --text:#e2e8f0;--text2:#94a3b8;
  --fh:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:14px;--rs:8px;--sh:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
body{font-family:var(--fh);font-size:15px;line-height:1.5}
#app{max-width:460px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
select,input,button,textarea{font-family:inherit;font-size:15px}
select option{background:var(--bg2);color:var(--text)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--teal-glow)}50%{box-shadow:0 0 0 10px transparent}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes orbit{0%{transform:rotate(0deg) translateX(22px) rotate(0deg)}100%{transform:rotate(360deg) translateX(22px) rotate(-360deg)}}
@keyframes ripple{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.2);opacity:0}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
@keyframes termtype{from{width:0}to{width:100%}}
@keyframes waitBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes waitSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes waitPulseRing{0%{box-shadow:0 0 0 0 rgba(45,212,191,0.6)}100%{box-shadow:0 0 0 20px transparent}}
@keyframes glitch1{0%,100%{clip-path:inset(50% 0 30% 0)}25%{clip-path:inset(10% 0 60% 0)}75%{clip-path:inset(70% 0 5% 0)}}
@keyframes glitch2{0%,100%{clip-path:inset(20% 0 70% 0)}25%{clip-path:inset(60% 0 15% 0)}75%{clip-path:inset(5% 0 80% 0)}}
.fade-up{animation:fadeUp 0.38s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn 0.25s ease both}

/* WAITING ANIMATION */
.wait-anim{display:inline-flex;align-items:center;justify-content:center;gap:5px}
.wait-anim span{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:waitBounce 0.9s ease infinite}
.wait-anim span:nth-child(2){animation-delay:0.15s}
.wait-anim span:nth-child(3){animation-delay:0.3s}
.wait-spinner{width:18px;height:18px;border:2.5px solid rgba(45,212,191,0.25);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.btn{width:100%;padding:17px;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.15s,transform 0.1s,background 0.2s;font-family:var(--fh)}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:var(--teal2)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-red{background:#ef444422;color:var(--red);border:1px solid #ef444430}
.btn:disabled{background:var(--card2);color:var(--muted);cursor:not-allowed;transform:none;opacity:1}
.inp{width:100%;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;transition:border-color 0.2s;font-family:var(--fh)}
.inp:focus{outline:none;border-color:var(--teal)}
.inp::placeholder{color:var(--muted)}
.inp:disabled{opacity:0.4;cursor:not-allowed}
.lbl{display:block;font-size:11px;font-family:var(--fm);color:var(--muted2);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.back-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;font-weight:700;padding:4px 0;display:flex;align-items:center;gap:6px;transition:color 0.2s;font-family:var(--fh)}
.back-btn:hover{color:var(--text)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--fm);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tag-red{background:#ef444420;color:var(--red);border:1px solid #ef444430}
.tag-amber{background:#f59e0b20;color:var(--amber);border:1px solid #f59e0b30}
.tag-green{background:#22c55e20;color:var(--green);border:1px solid #22c55e30}
.tag-teal{background:var(--teal-glow2);color:var(--teal);border:1px solid rgba(45,212,191,0.25)}
.err-box{background:#ef444412;border:1px solid #ef444430;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#fca5a5;line-height:1.5}
.ok-box{background:#22c55e12;border:1px solid #22c55e30;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#86efac;line-height:1.5}
.info-box{background:var(--teal-glow2);border:1px solid rgba(45,212,191,0.2);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--teal);line-height:1.5}

#topBar{position:sticky;top:0;z-index:100;background:rgba(6,11,20,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.token-badge{background:var(--teal-glow);border:1px solid rgba(45,212,191,0.35);border-radius:20px;padding:6px 13px;font-size:12px;font-family:var(--fm);color:var(--teal);cursor:pointer;white-space:nowrap;transition:background 0.2s}
.token-badge:hover{background:rgba(45,212,191,0.2)}

/* FEEDBACK BUBBLE */
#fbBubble{position:fixed;bottom:24px;right:20px;z-index:200;width:58px;height:58px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 20px rgba(45,212,191,0.35);transition:transform 0.2s;animation:pulse 3s ease infinite}
#fbBubble:hover{transform:scale(1.12)}
.fb-tooltip{position:fixed;bottom:84px;right:18px;z-index:199;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;color:var(--teal);white-space:nowrap;pointer-events:none;opacity:0;transform:translateY(6px) scale(0.95);transition:opacity 0.25s,transform 0.25s;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.fb-tooltip.show{opacity:1;transform:translateY(0) scale(1)}
.fb-tooltip::after{content:'';position:absolute;bottom:-6px;right:19px;width:10px;height:10px;background:var(--card);border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);transform:rotate(45deg)}

#fbPanel{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;z-index:300;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 32px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.16,1,.3,1)}
#fbPanel.open{transform:translateY(0)}
#fbOverlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.65);opacity:0;pointer-events:none;transition:opacity 0.3s}
#fbOverlay.open{opacity:1;pointer-events:all}
#installBar{display:none}
#installBar.visible{display:block}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
.splash-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:44px 44px;opacity:0.25}
.logo-ring{width:80px;height:80px;border-radius:22px;background:var(--teal-glow);border:2px solid rgba(45,212,191,0.5);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;animation:pulse 2s ease infinite}
.splash-title{font-size:34px;font-weight:900;color:var(--teal);letter-spacing:-1.5px;margin-top:18px;font-family:var(--fh)}

/* TERMINAL */
.terminal{background:#01080a;border:1px solid #0c2a1a;border-radius:var(--r);padding:18px;font-family:var(--fm);font-size:12px;overflow-y:auto;line-height:2;flex:1;min-height:260px;position:relative}
.terminal::before{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(transparent,rgba(34,197,94,0.4),transparent);animation:scanline 3s linear infinite;z-index:1;pointer-events:none}
.term-line{display:flex;gap:8px;align-items:flex-start}
.term-prompt{color:#16522a;flex-shrink:0}
.term-text{color:#22c55e}
.term-text.done{color:#4ade80}
.term-cursor{display:inline-block;animation:blink 0.9s infinite;color:#22c55e}

/* FULL-SCREEN TERMINAL OVERLAY */
#termOverlay{position:fixed;inset:0;z-index:600;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
#termOverlay.active{display:flex}
#termOverlayBox{width:100%;max-width:420px;background:#01080a;border:1px solid #0c2a1a;border-radius:14px;padding:22px;font-family:'DM Mono',monospace;font-size:13px;min-height:220px;position:relative;overflow:hidden}
#termOverlayBox::before{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(transparent,rgba(34,197,94,0.5),transparent);animation:scanline 2.5s linear infinite;pointer-events:none}
.term-ov-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #0c2a1a}
.term-ov-dot{width:10px;height:10px;border-radius:50%}
.term-ov-title{font-size:11px;color:#22c55e;letter-spacing:3px;text-transform:uppercase}
.term-ov-line{color:#22c55e;line-height:2.2;opacity:0;animation:fadeIn 0.3s ease forwards}
.term-ov-line .prompt{color:#165228}
.term-ov-oracle{color:#4ade80;font-weight:700}

/* AUTH */
.auth-tab{display:flex;background:var(--card);border-radius:var(--r);padding:4px;margin-bottom:22px}
.auth-tab button{flex:1;padding:11px;border:none;border-radius:var(--rs);background:transparent;color:var(--muted2);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--fh)}
.auth-tab button.active{background:var(--teal);color:#000}

/* PASSWORD TOGGLE */
.pass-wrap{position:relative}
.pass-wrap .inp{padding-right:48px}
.pass-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted2);font-size:18px;padding:4px;transition:color 0.2s;line-height:1}
.pass-eye:hover{color:var(--teal)}

.progress-bar{height:4px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--teal));border-radius:4px;transition:width 0.4s ease}

.check-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color 0.2s,background 0.2s}
.check-card.pass{border-color:rgba(34,197,94,0.45)!important;background:rgba(34,197,94,0.04)!important}
.check-card.fail{border-color:rgba(239,68,68,0.45)!important;background:rgba(239,68,68,0.04)!important}
.check-btn{padding:14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg2);color:var(--muted2);font-weight:800;font-size:14px;cursor:pointer;width:100%;transition:all 0.18s;font-family:var(--fh);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.check-btn:active{transform:scale(0.96)}
.check-btn.pass-active{background:var(--green)!important;border-color:var(--green)!important;color:#000!important}
.check-btn.fail-active{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}

.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:24px 20px 44px;width:100%;max-width:460px;animation:slideUp 0.35s cubic-bezier(.16,1,.3,1)}
.pack-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}
.pack-card:hover{border-color:var(--teal)}
.pack-card.featured{border-color:var(--teal);background:var(--teal-glow2)}
.popular-badge{position:absolute;top:-10px;right:16px;background:var(--teal);color:#000;font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px;font-family:var(--fm);letter-spacing:0.5px}

.section-title{font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:18px 0}
.acct-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.acct-row:last-child{border-bottom:none}

/* NEGOTIATION LEVERAGE CARD */
.leverage-card{background:linear-gradient(135deg,rgba(239,68,68,0.08),rgba(239,68,68,0.03));border:1px solid rgba(239,68,68,0.3);border-radius:var(--r);padding:16px;margin-bottom:12px}
.leverage-card.medium{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.03));border-color:rgba(245,158,11,0.3)}
.leverage-card.standard{background:var(--teal-glow2);border-color:rgba(45,212,191,0.25)}
.leverage-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-family:var(--fm);font-weight:700;letter-spacing:0.5px;margin-bottom:8px}
.leverage-badge.high{background:rgba(239,68,68,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.leverage-badge.medium{background:rgba(245,158,11,0.2);color:var(--amber);border:1px solid rgba(245,158,11,0.3)}
.leverage-badge.standard{background:var(--teal-glow);color:var(--teal);border:1px solid rgba(45,212,191,0.3)}

/* GHOST HISTORY PROTOCOL */
.ghost-card{background:linear-gradient(135deg,rgba(99,77,158,0.1),rgba(99,77,158,0.04));border:1px solid rgba(139,92,246,0.25);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* ORACLE SECTION */
.oracle-section{background:linear-gradient(135deg,rgba(45,212,191,0.06),rgba(45,212,191,0.02));border:1px solid rgba(45,212,191,0.2);border-radius:var(--r);padding:16px;margin-bottom:14px}
.oracle-label{font-size:10px;font-family:var(--fm);color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* COUNTRY SELECT */
.country-select-wrap{position:relative}
.country-select-wrap select{appearance:none;-webkit-appearance:none;padding-right:36px}
.country-select-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none;font-size:12px}

/* LEVEL 2 PAGE */
.level2-page{background:var(--bg);min-height:100dvh}
.level2-header{background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.04));border-bottom:1px solid rgba(245,158,11,0.25);padding:14px 20px}

/* RESULTS DISCLAIMER FOOTER */
.results-disclaimer{background:rgba(100,116,139,0.08);border:1px solid rgba(100,116,139,0.2);border-radius:var(--rs);padding:14px;margin-top:4px;margin-bottom:20px;font-size:11px;color:var(--muted);line-height:1.7;text-align:center}
.results-disclaimer strong{color:var(--muted2)}

/* CONFIDENCE INDICATOR */
.confidence-bar{height:6px;border-radius:4px;overflow:hidden;background:var(--card2);margin-top:6px}
.confidence-fill-high{height:100%;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:4px}
.confidence-fill-med{height:100%;background:linear-gradient(90deg,var(--amber),#fcd34d);border-radius:4px}
.confidence-fill-low{height:100%;background:linear-gradient(90deg,var(--muted),var(--muted2));border-radius:4px}

/* TOS CHECKBOX */
.tos-wrap{display:flex;align-items:flex-start;gap:12px;background:rgba(45,212,191,0.04);border:1px solid rgba(45,212,191,0.18);border-radius:var(--rs);padding:14px;margin-top:6px}
.tos-wrap input[type=checkbox]{width:20px;height:20px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;margin-top:1px}
.tos-wrap label{font-size:12px;color:var(--text2);line-height:1.7;cursor:pointer}
.tos-wrap a{color:var(--teal);text-decoration:none}
.tos-wrap a:hover{text-decoration:underline}

/* SOURCE LABEL */
.src-label{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:10px;font-family:var(--fm);color:var(--muted2)}
.src-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* VIN INPUT */
.vin-section{background:rgba(45,212,191,0.04);border:1px dashed rgba(45,212,191,0.25);border-radius:var(--rs);padding:14px;margin-top:6px}
</style>
</head>
<body>

<div id="installBar" onclick="installPWA()" style="display:none;background:linear-gradient(135deg,rgba(45,212,191,0.15),rgba(45,212,191,0.06));border-bottom:1px solid rgba(45,212,191,0.25);padding:12px 20px;cursor:pointer">
  <div style="display:flex;align-items:center;justify-content:space-between;max-width:460px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:22px">📲</div>
      <div>
        <div style="font-size:13px;font-weight:800;color:#2dd4bf">Add to Home Screen</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:1px">Works like a native app — no App Store</div>
      </div>
    </div>
    <div style="background:#2dd4bf;color:#000;font-size:12px;font-weight:900;padding:7px 14px;border-radius:20px;white-space:nowrap;font-family:'DM Mono',monospace">Install →</div>
  </div>
</div>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-grid"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
    <div class="logo-ring">🛡️</div>
    <div class="splash-title">DealerDefense</div>
    <div style="font-size:11px;font-family:var(--fm);color:var(--muted);letter-spacing:3px;margin-top:6px">BY CARZMOOD</div>
    <div style="font-size:12px;font-family:var(--fm);color:var(--muted);margin-top:28px;animation:blink 1.2s infinite" id="splashMsg">Starting up your car check tool...</div>
  </div>
</div>

<!-- FULL-SCREEN TERMINAL OVERLAY -->
<div id="termOverlay">
  <div id="termOverlayBox">
    <div class="term-ov-header">
      <div class="term-ov-dot" style="background:#ef4444"></div>
      <div class="term-ov-dot" style="background:#f59e0b"></div>
      <div class="term-ov-dot" style="background:#22c55e"></div>
      <div class="term-ov-title">DEALERDEFENSE™ — CHECKING YOUR CAR</div>
    </div>
    <div id="termOverlayLines"></div>
  </div>
  <div style="margin-top:20px;font-size:11px;font-family:'DM Mono',monospace;color:rgba(34,197,94,0.4);letter-spacing:2px">RUNNING CHECKS — PLEASE WAIT</div>
</div>

<div id="app"></div>

<!-- FEEDBACK BUBBLE -->
<div class="fb-tooltip" id="fbTooltip">💬 Send Us a Message</div>
<button id="fbBubble" title="Send us a message" aria-label="Send us a message">
  <span style="display:flex;flex-direction:column;align-items:center;gap:2px">
    <span style="font-size:18px;line-height:1">💬</span>
    <span style="font-size:8px;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:0.5px;color:#000;line-height:1">FEEDBACK</span>
  </span>

// ═══════════════════════════════════════════════════
// REPAIR COST ESTIMATOR
// ═══════════════════════════════════════════════════
function getRepairCost(label) {
  const l = label.toLowerCase();
  if (l.includes('head gasket')) return {label:'Head Gasket',min:1200,max:2800};
  if (l.includes('timing chain')||l.includes('timing belt')) return {label:'Timing Chain/Belt',min:800,max:2000};
  if (l.includes('cvt')) return {label:'CVT Replacement',min:3500,max:8000};
  if (l.includes('transmission')||l.includes('gearbox')) return {label:'Transmission Rebuild/Replace',min:2500,max:8000};
  if (l.includes('engine')||l.includes('motor')) return {label:'Engine Repair',min:1500,max:8000};
  if (l.includes('air suspension')) return {label:'Air Suspension',min:800,max:3500};
  if (l.includes('rust')||l.includes('frame rust')||l.includes('frame integrity')) return {label:'Rust/Frame Repair',min:500,max:5000};
  if (l.includes('lifter')||l.includes('afm')||l.includes('mds')) return {label:'Lifter/AFM Repair',min:2000,max:5000};
  if (l.includes('ims')||l.includes('bearing')) return {label:'IMS/Bearing Repair',min:2000,max:6000};
  if (l.includes('turbo')) return {label:'Turbo Repair',min:1000,max:3500};
  if (l.includes('brake')) return {label:'Complete Brake Job',min:400,max:1200};
  if (l.includes('suspension')) return {label:'Suspension Repair',min:500,max:2000};
  if (l.includes('electrical')) return {label:'Electrical Diagnosis/Repair',min:300,max:1500};
  return null;
}

// ═══════════════════════════════════════════════════
// KB LOOKUP HELPERS
// ═══════════════════════════════════════════════════
function getKBIssues(make, model) {
  const makeKey = Object.keys(KB).find(k => k.toUpperCase() === make.toUpperCase());
  if (!makeKey) return {issues:[], modelData:null};
  const makeData = KB[makeKey];
  const issues = [];
  if (makeData._) issues.push(...makeData._.map((l,i) => ({id:'kb_g_'+i, cat:'Known Issue', label:l, critical:l.includes('🚨')||l.includes('⚠️')})));
  const normMod = model.toUpperCase().replace(/[^A-Z0-9]/g,'');
  const modelKey = Object.keys(makeData).find(k => {
    if (k === '_') return false;
    const nk = k.toUpperCase().replace(/[^A-Z0-9]/g,'');
    return normMod.includes(nk) || nk.includes(normMod) || normMod === nk;
  });
  if (!modelKey) return {issues, modelData:null};
  return {issues, modelData: makeData[modelKey]};
}

function getYearRangeIssues(modelData, year) {
  const yr = parseInt(year);
  for (const range of Object.keys(modelData)) {
    const [s,e] = range.split(':').map(Number);
    if (yr >= s && yr <= e) {
      return modelData[range].map((l,i) => ({id:'kb_m_'+i, cat:'Model-Specific', label:l, critical:l.includes('🚨')||l.includes('⚠️')}));
    }
  }
  return [];
}

async function hashPass(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('CARZ2025_'+p));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function detectCountry() {

                 FR:'FRANCE',IT:'ITALY',ES:'SPAIN',NL:'NETHERLANDS',SE:'SWEDEN',
                 NO:'NORWAY',ZA:'SOUTH AFRICA',AE:'UAE',SG:'SINGAPORE',NZ:'NEW ZEALAND'};
    return map[cc] || 'USA';
  } catch { return 'USA'; }
}

async function handleAuth() {
  const email = ($('authEmail')?.value||'').trim().toLowerCase();
  const pass  = ($('authPass')?.value||'');
  S.authErr = ''; S.authOk = '';

  if (!email || !pass) { S.authErr='Please fill in all fields.'; render(); return; }
  if (S.authMode==='signup' && pass!==($('authPass2')?.value||'')) { S.authErr='Passwords do not match.'; render(); return; }
  if (pass.length < 6) { S.authErr='Password must be at least 6 characters.'; render(); return; }

  // TOS check on signup
  if (S.authMode==='signup') {
    const tosBox = $('tosCheck');
    if (!tosBox || !tosBox.checked) {
      S.authErr='You must accept the Terms of Service to create an account.';
      render(); return;
    }
    S.tosAccepted = true;
  }

  const btn = $('authBtn');
  if (btn) { btn.disabled=true; btn.innerHTML=`<span class="wait-anim"><span></span><span></span><span></span></span> Please wait...`; }
  S.authLoading = true;
  const hash = await hashPass(pass);
  const ip   = await getUserIP();
  const res  = await gasPost({action:S.authMode, email, hash, ip, tosAccepted: S.tosAccepted});
  S.authLoading = false;

  if (!res.ok) { S.authErr = res.error||'Something went wrong. Please try again.'; render(); return; }

  if (S.authMode === 'login') {
    S._pending = {email, hash, tokens:res.tokens, joined:res.joined||''};
    const otpRes = await gasPost({action:'sendOTP', email, type:'verify'});
    if (!otpRes.ok) { S.authErr='Could not send your verification code: '+(otpRes.error||''); render(); return; }
    S.phase = 'verify2fa'; render();
    return;
  }

  S.user = {email, hash, tokens:res.tokens, joined:res.joined||''};
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  sessionStorage.setItem('cm_session', '1');
  markDevice(email);
  S.phase = 'home'; render();
}

async function handle2FA() {
  const otp = ($('otpInput')?.value||'').trim();
  if (!otp||otp.length!==6) { S.authErr='Enter the 6-digit code.'; render(); return; }
  S.authLoading = true; render();
  const res = await gasPost({action:'verifyOTP', email:S._pending.email, otp});
  S.authLoading = false;
  if (!res.ok) { S.authErr = res.error||'Invalid code. Please try again.'; render(); return; }

  if (S.rememberMe) {
    localStorage.setItem('cm_user', JSON.stringify(S.user));
  } else {
    sessionStorage.setItem('cm_user_session', JSON.stringify(S.user));
    localStorage.removeItem('cm_user');
  }
  sessionStorage.setItem('cm_session', '1');
  S._pending = null;
  S.phase = 'home'; render();
}

// CORE ANALYSIS LOGIC
// ═══════════════════════════════════════════════════
async function startAnalysis() {
  if (!S.car.year||!S.car.make||!S.car.model) { alert('Please fill in all vehicle fields.'); return; }
  if (S.user.tokens<=0) { S.showTokenModal=true; render(); return; }

  S.phase='loading'; S.termLines=['[CHECKING] STARTING YOUR CAR CHECK...']; S.answers={};
  S.globalForensic = null; S.checkLevel = 1;
  render();

  showTermOverlay(null);

  let ti=0;
  const termTimer = setInterval(()=>{
    if (ti<TERM_LINES.length) {
      S.termLines.push(TERM_LINES[ti++]);
      const tb=$('termBox'); if(tb){tb.innerHTML=buildTermHTML();tb.scrollTop=tb.scrollHeight;}
    }
  }, 700);

  const fetchTimeout = (url, ms=8000) => {
    const ctl = new AbortController();
    const id  = setTimeout(()=>ctl.abort(), ms);
    return fetch(url,{signal:ctl.signal}).finally(()=>clearTimeout(id));
  };

  try {
    const deductRes = await gasPost({action:'deduct', email:S.user.email, hash:S.user.hash});
    if (!deductRes.ok) { clearInterval(termTimer); S.showTokenModal=true; S.phase='home'; render(); return; }
    S.user.tokens = deductRes.tokens; localStorage.setItem('cm_user',JSON.stringify(S.user));

    // LAYER 1: NHTSA official data
    const [recallRes, compRes] = await Promise.all([
      fetchTimeout(`https://api.nhtsa.gov/recalls/recallsByVehicle?make=${esc(S.car.make)}&model=${esc(S.car.model)}&modelYear=${S.car.year}`)
        .then(r=>r.json()).catch(()=>({Results:[]})),
      fetchTimeout(`https://api.nhtsa.gov/complaints/complaintsByVehicle?make=${esc(S.car.make)}&model=${esc(S.car.model)}&modelYear=${S.car.year}`)
        .then(r=>r.json()).catch(()=>({results:[]}))
    ]);

    S.nhtsa.recalls    = recallRes.Results || recallRes.results || [];
    S.nhtsa.complaints = compRes.results || [];

    // VIN decode if provided
    if (S.car.vin && S.car.vin.length >= 10) {
      fetchTimeout(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVin/${esc(S.car.vin)}?format=json`, 6000)
        .then(r=>r.json()).then(vd=>{
          if (vd && vd.Results) S.vinData = vd.Results;
        }).catch(()=>{});
    }

    // GLOBAL FORENSIC via GAS backend
    const forensicRes = await gasPost({
      action:'globalForensicAnalysis',
      year: S.car.year,
      make: S.car.make,
      model: S.car.model,
      country: S.car.country || 'USA',
      region: S.car.country || 'USA',
      vin: S.car.vin || ''
    });
    if (forensicRes.ok) S.globalForensic = forensicRes;

    buildChecklist();

    const elapsed = S.termLines.length * 700;
    const wait = Math.max(0, 4500 - elapsed);
    setTimeout(()=>{ clearInterval(termTimer); S.phase='checklist'; render(); }, wait);

  } catch(err) {
    clearInterval(termTimer);
    S.termLines.push('[INFO] Connection slow — using built-in knowledge data...');
    buildChecklist();
    setTimeout(()=>{ S.phase='checklist'; render(); }, 1500);
  }
}

// ═══════════════════════════════════════════════════
// DYNAMIC CHECKLIST BUILDER
// Uses backend dynamic checklist when available.
// Falls back to KB + complaint data if not.
// ═══════════════════════════════════════════════════
function buildChecklist() {
  const gf = S.globalForensic;
  const dynCL = gf && gf.dynamicChecklist;
  const backendL1 = dynCL && dynCL.level1 && dynCL.level1.length > 0 ? dynCL.level1 : null;
  const backendL2 = dynCL && dynCL.level2 && dynCL.level2.length > 0 ? dynCL.level2 : null;

  let l1items = [];
  let l2items = [];

  if (backendL1) {
    // ── PRIMARY PATH: use the backend dynamic checklist ────────
    // The backend already analysed recalls, complaints, live search
    // signals and vehicle profile — trust it fully.
    backendL1.forEach((item, i) => {
      l1items.push({
        id: item.id || 'bl1_'+i,
        critical: item.priority === 'critical',
        cat: item.priority === 'critical' ? 'CRITICAL' : 'Check',
        level: 1,
        label: `${item.icon ? item.icon + ' ' : ''}${item.title}: ${item.detail}`,
        badge: item.priority === 'critical' ? 'Critical — Do Not Skip' : null,
        icon: item.icon,
        title: item.title,
        detail: item.detail,
        priority: item.priority
      });
    });
    if (backendL2) {
      backendL2.forEach((item, i) => {
        l2items.push({
          id: item.id || 'bl2_'+i,
          critical: item.priority === 'critical',
          cat: item.priority === 'critical' ? 'CRITICAL' : 'Test Drive',
          level: 2,
          label: `${item.icon ? item.icon + ' ' : ''}${item.title}: ${item.detail}`,
          badge: item.priority === 'critical' ? 'Critical — Do Not Skip' : null,
          icon: item.icon,
          title: item.title,
          detail: item.detail,
          priority: item.priority
        });
      });
    }

    // Inject any live recall checks from NHTSA at the very top (frontend also fetches these)
    const recallItems = [];
    if (S.nhtsa.recalls.length > 0) {
      S.nhtsa.recalls.slice(0, 3).forEach((rec, i) => {
        const id = 'recall_front_'+i;
        // Only add if backend didn't already include a recall check
        if (!l1items.some(x => x.id === 'recall-status')) {
          recallItems.push({
            id, critical: true, cat: 'Federal Recall ⚠️', level: 1,
            badge: `${S.nhtsa.recalls.length} active government recall${S.nhtsa.recalls.length>1?'s':''}`,
            label: `⚠️ FEDERAL RECALL${i>0?' #'+(i+1):''}: ${rec.Component||'Safety component'} — ${(rec.Summary||'Confirm recall was completed at zero cost').substring(0,130)}`,
            isActiveRecall: true, priority: 'critical'
          });
        }
      });
    }
    l1items = [...recallItems, ...l1items];

  } else {
    // ── FALLBACK PATH: backend unavailable — use KB + NHTSA ───
    l1items = UNIVERSAL.filter(i=>i.level===1).map(i=>({...i}));
    l2items = UNIVERSAL.filter(i=>i.level===2).map(i=>({...i}));

    if (S.nhtsa.recalls.length>0) {
      const recallInserts = S.nhtsa.recalls.slice(0,3).map((rec,i)=>({
        id:'recall_'+i, critical:true, cat:'Federal Recall ⚠️', level:1,
        badge:`${S.nhtsa.recalls.length} active government recall${S.nhtsa.recalls.length>1?'s':''}`,
        label:`FEDERAL RECALL${i>0?' #'+(i+1):''}: ${rec.Component||'Safety issue'} — ${(rec.Summary||'Confirm recall completed').substring(0,120)}`,
        isActiveRecall:true
      }));
      l1items.splice(2,0,...recallInserts);
    }

    const compCats = {};
    (S.nhtsa.complaints||[]).forEach(c=>{
      const comp=(c.components||'').toLowerCase();
      if(comp.includes('engine')||comp.includes('fuel'))compCats.engine=true;
      if(comp.includes('transmission')||comp.includes('driveline'))compCats.trans=true;
      if(comp.includes('steering'))compCats.steer=true;
      if(comp.includes('suspension'))compCats.susp=true;
      if(comp.includes('airbag')||comp.includes('srs'))compCats.airbag=true;
    });
    const compCount=S.nhtsa.complaints.length;
    if(compCount>3&&compCats.engine)l1items.push({id:'nhtsa_eng',critical:true,cat:'NHTSA Complaints',level:1,badge:`${compCount}+ owner reports`,label:`ENGINE ALERT: Multiple owner complaints about engine/fuel issues on this ${S.car.year} ${S.car.make} ${S.car.model}. Inspect carefully — check oil, listen for knocking, watch for smoke.`});
    if(compCount>3&&compCats.trans)l2items.push({id:'nhtsa_tr',critical:true,cat:'NHTSA Complaints',level:2,badge:'Multiple owner reports',label:`TRANSMISSION ALERT: Multiple federal complaints about transmission on this model. Test all gears — any hesitation, jerk, or shudder = walk away.`});
    if(compCats.steer)l2items.push({id:'nhtsa_st',critical:false,cat:'NHTSA Complaints',level:2,label:`STEERING: Owner complaints on file. Test drive: check for pulling to one side, vibration, or loose feel.`});
    if(compCats.airbag)l1items.push({id:'nhtsa_ab',critical:true,cat:'NHTSA Complaints',level:1,badge:'Safety critical',label:`AIRBAG / SRS: Complaints reported for this model. Check the SRS warning light is OFF and ask for recall documentation.`});
    if(compCats.susp)l2items.push({id:'nhtsa_su',critical:false,cat:'NHTSA Complaints',level:2,label:`SUSPENSION: Complaints on file. Drive over bumps slowly — listen for clunks or rattles.`});

    const kbResult=getKBIssues(S.car.make,S.car.model);
    if(kbResult&&kbResult.issues&&kbResult.issues.length>0){
      kbResult.issues.forEach((item,i)=>{
        const lvl=item.label.toLowerCase().includes('test drive')||item.label.toLowerCase().includes('accelerat')||item.label.toLowerCase().includes('during')?2:1;
        (lvl===2?l2items:l1items).push({id:'kbg'+i,critical:item.critical,cat:'Make-Known Issue',level:lvl,label:item.label,badge:item.critical?'Known Issue':null});
      });
    }
    if(kbResult&&kbResult.modelData){
      const yearIssues=getYearRangeIssues(kbResult.modelData,S.car.year);
      yearIssues.forEach((item,i)=>{
        const lvl=item.label.toLowerCase().includes('test drive')||item.label.toLowerCase().includes('accelerat')||item.label.toLowerCase().includes('shudder')||item.label.toLowerCase().includes('during')?2:1;
        (lvl===2?l2items:l1items).push({id:'kbm'+i,critical:item.critical,cat:'Model+Year Specific',level:lvl,label:item.label,badge:item.critical?'Verified Issue':null});
      });
    }
    l1items.push(...GHOST_PROTOCOL.map(g=>({...g})));
  }

  // Combine
  S.checklist = [
    ...l1items.map((item,i)=>({level:1,...item,id:item.id||'l1_'+i})),
    ...l2items.map((item,i)=>({level:2,...item,id:item.id||'l2_'+i}))
  ];
}

// RELIABILITY VERDICT BUILDER
// Generates the "Is this car reliable?" banner
// ═══════════════════════════════════════════════════
function buildReliabilityBanner() {
  const gf = S.globalForensic;
  const layer1 = gf && gf.layer1;
  const layer2 = gf && gf.layer2;
  const recallCount = S.nhtsa.recalls.length || (layer1 && layer1.recalls ? layer1.recalls.length : 0);
  const complaintCount = S.nhtsa.complaints.length || (layer1 && layer1.complaints ? layer1.complaints.length : 0);
  const failures = (layer2 && layer2.failures) || [];
  const reliabilityKws = (layer2 && layer2.reliabilityKeywords) || [];
  const dbName = (layer1 && layer1.dbName) || (S.car.country==='USA'?'NHTSA':'Official Safety Database');
  const dynCL = gf && gf.dynamicChecklist;
  const profileFlags = dynCL && dynCL.vehicleProfile ? dynCL.vehicleProfile : {};

  // Score reliability: start at 100, deduct for signals
  let reliScore = 100;
  let redFlags = [];
  let greenFlags = [];
  let warningFlags = [];

  if (recallCount >= 3) { reliScore -= 30; redFlags.push(`${recallCount} active government recalls`); }
  else if (recallCount > 0) { reliScore -= 15; warningFlags.push(`${recallCount} recall${recallCount>1?'s':''} on record`); }

  if (complaintCount > 100) { reliScore -= 25; redFlags.push(`${complaintCount}+ owner complaints filed`); }
  else if (complaintCount > 30) { reliScore -= 12; warningFlags.push(`${complaintCount} owner complaints filed`); }
  else if (complaintCount > 5) { reliScore -= 5; warningFlags.push(`${complaintCount} complaints filed`); }

  const criticalIssues = ['cvt failure','transmission failure','head gasket','engine failure','oil consumption','frame rust','lifter'];
  let critHits = 0;
  failures.concat(reliabilityKws).forEach(f=>{
    if(criticalIssues.some(c=>f.indexOf(c)>-1)) critHits++;
  });
  if(critHits >= 3) { reliScore -= 30; redFlags.push(`${critHits} documented mechanical failure patterns found`); }
  else if(critHits >= 1) { reliScore -= 12; warningFlags.push(`${critHits} documented issue pattern${critHits>1?'s':''} found online`); }

  // KB-based reliability notes
  const kbResult = getKBIssues(S.car.make, S.car.model);
  let kbSummary = null;
  if (kbResult && kbResult.modelData) {
    const yearIssues = getYearRangeIssues(kbResult.modelData, S.car.year);
    const hasCritical = yearIssues.some(i=>i.critical);
    if (hasCritical) { reliScore -= 20; redFlags.push('Known critical issues for this year/model'); }
    else if (yearIssues.length > 0) { reliScore -= 5; warningFlags.push('Some known issues for this year'); }
    else { greenFlags.push('No critical known issues for this year'); }
  }

  if (reliScore < 0) reliScore = 0;
  const isReliable = reliScore >= 65 && redFlags.length === 0;
  const isCaution  = reliScore >= 40 && redFlags.length <= 1;

  let verdict, verdictColor, verdictBg, verdictIcon;
  if (isReliable) {
    verdict = 'Generally Reliable';
    verdictColor = 'var(--green)';
    verdictBg = 'rgba(34,197,94,0.08)';
    verdictIcon = '✅';
    if (greenFlags.length === 0) greenFlags.push('No major known issues found in database');
  } else if (isCaution) {
    verdict = 'Buy With Caution';
    verdictColor = 'var(--amber)';
    verdictBg = 'rgba(245,158,11,0.08)';
    verdictIcon = '⚠️';
  } else {
    verdict = 'High Risk — Inspect Carefully';
    verdictColor = 'var(--red)';
    verdictBg = 'rgba(239,68,68,0.08)';
    verdictIcon = '🚨';
  }

  const source = layer1 && layer1.hasOfficialData ? `Live data from ${dbName}` : (gf ? 'Live search + knowledge base' : 'Knowledge base only');
  return { verdict, verdictColor, verdictBg, verdictIcon, redFlags, warningFlags, greenFlags, source, recallCount, complaintCount, reliScore };
}

function calcVerdict() {
  const allAnswered = S.checkLevel === 1 ? S.checklist.filter(i=>i.level===1) : S.checklist;
  const fails = allAnswered.filter(i=>S.answers[i.id]==='fail').length;
  const critFails = allAnswered.filter(i=>i.critical&&S.answers[i.id]==='fail').length;
  const hasActiveRecall = S.nhtsa.recalls.length > 0 || (S.globalForensic?.layer1?.investigations?.length > 0);
  let score = 100-(fails*12)-(critFails*25); if(score<0)score=0;
  if (hasActiveRecall && score >= 40) score = Math.min(score, 38);
  const failedItems = allAnswered.filter(i=>S.answers[i.id]==='fail');
  S.verdict = {score, buy:score>=78&&critFails===0, neg:score>=45&&critFails<=1, fails, critFails, failedItems, hasActiveRecall, checkLevel:S.checkLevel};
  S.phase='verdict'; render();
}

// ═══════════════════════════════════════════════════
// CHECKLIST ANSWER HANDLER
// ═══════════════════════════════════════════════════
function handleCheckAnswer(itemId, val) {
  S.answers[itemId] = val;
  const card = document.querySelector(`.check-card[data-id="${itemId}"]`);
  if (card) {
    card.classList.remove('pass','fail');
    if (val) card.classList.add(val);
    card.querySelectorAll('.check-btn').forEach(b => {
      b.classList.remove('pass-active','fail-active');
      if (b.dataset.val === val) b.classList.add(val === 'pass' ? 'pass-active' : 'fail-active');
    });
  }
  const activeItems = S.checkLevel === 1 ? S.checklist.filter(i=>i.level===1) : S.checklist;
  const done = activeItems.filter(i=>S.answers[i.id]).length;
  const total = activeItems.length;
  const pct = Math.round(done/total*100)||0;
  const ctr = $('checkCounter'); if (ctr) ctr.textContent = `${done}/${total} checked`;
  const pctEl = $('checkPct'); if (pctEl) pctEl.textContent = `${pct}%`;
  const fill = $('progressFill'); if (fill) fill.style.width = pct+'%';
  if (done === total) { render(); }
}

function render() {
  const a = $('app');
  $('fbBubble').style.display = (['splash','auth','verify2fa'].includes(S.phase))?'none':'flex';
  switch(S.phase) {
    case 'auth':        a.innerHTML = renderAuth();        break;
    case 'verify2fa':   a.innerHTML = renderVerify2FA();   break;
    case 'home':        a.innerHTML = renderHome();        break;
    case 'input':       a.innerHTML = renderInput();       break;
    case 'loading':     a.innerHTML = renderLoading();     break;
    case 'checklist':   a.innerHTML = renderChecklist();   break;
    case 'level2':      a.innerHTML = renderLevel2();      break;
    case 'verdict':     a.innerHTML = renderVerdict();     break;
    case 'account':     a.innerHTML = renderAccount();     break;
  }
  const mo = document.querySelector('.modal-overlay'); if(mo) mo.remove();
  if(S.showTokenModal) renderTokenModal();
}

// ═══════════════════════════════════════════════════

}

  const pct = Math.round(done/total*100)||0;

  return `<div class="fade-in level2-page">

        <div style="font-size:13px;color:var(--text2);line-height:1.6">These checks require the engine running and a short test drive. Only do these if you're seriously considering the car.</div>

          <div style="font-size:13px;line-height:1.65;margin-bottom:14px;color:var(--text)">${i.label}</div>

// ═══════════════════════════════════════════════════
// VERDICT / RESULTS SCREEN
// ═══════════════════════════════════════════════════
function renderVerdict() {
  const v=S.verdict;
  const vc = v.buy?'var(--green)':v.neg?'var(--amber)':'var(--red)';
  const icon = v.buy?'✅':v.neg?'⚠️':'🚫';
  const label = v.buy?'SAFE TO BUY':v.neg?'NEGOTIATE HARD':'WALK AWAY';
  const msg = v.buy
    ? `This car passed all the important checks. You can buy it with confidence — at a fair price.`
    : v.neg
    ? `${v.critFails} serious and ${v.fails} total problems found. Use each failed check as leverage to lower the price.`
    : `${v.critFails} serious problem${v.critFails!==1?'s':''} found. The cost to fix this car is too high for what they are asking.`;

  const disc = v.score>=78?3:v.score>=60?10:v.score>=45?20:30;

  let minCost=0, maxCost=0;
  v.failedItems.forEach(item=>{
    const rc=getRepairCost(item.label);
    if(rc){minCost+=rc.min;maxCost+=rc.max;}
  });

  const gf = S.globalForensic;
  const marketDelta = gf?.marketDelta;
  const negotiation = gf?.negotiationScript;
  const layer1 = gf?.layer1;
  const layer2 = gf?.layer2;
  const dbName = layer1?.dbName || (S.car.country==='USA'?'NHTSA (United States)':'Official Safety Database');
  const timestamp = new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

  // Confidence rating
  const hasOfficialData = S.nhtsa.recalls.length>0||S.nhtsa.complaints.length>5;
  const hasForensic = !!gf;
  const confidenceScore = hasOfficialData&&hasForensic?85:hasOfficialData||hasForensic?60:40;
  const confidenceLabel = confidenceScore>=80?'High':'Medium';

  return `<div class="fade-up">
    <div id="topBar">
      <button class="back-btn" onclick="${v.checkLevel===2?'S.phase=\'level2\';render()':'S.phase=\'checklist\';render()'}">← Back to Checks</button>
      <button class="back-btn" onclick="S.phase='home';S.answers={};S.verdict=null;render()" style="color:var(--teal)">🏠 Home</button>
    </div>
    <div style="padding:20px 20px 20px">

      <!-- MAIN VERDICT CARD -->
      <div class="card" style="border-color:${vc}55;text-align:center;padding:28px 20px;margin-bottom:16px">
        <div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:3px;margin-bottom:12px">CAR CHECK COMPLETE</div>
        <div style="font-size:48px;margin-bottom:10px">${icon}</div>
        <div style="font-size:26px;font-weight:900;color:${vc};letter-spacing:-0.5px;margin-bottom:10px">${label}</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px">${msg}</div>
        <div style="font-size:72px;font-weight:900;color:${vc};font-family:var(--fm);line-height:1;margin-bottom:4px">${v.score}</div>
        <div style="font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px">CAR HEALTH SCORE / 100</div>
        ${v.hasActiveRecall?`<div style="margin-top:12px;font-size:11px;font-family:var(--fm);color:var(--red);background:rgba(239,68,68,0.1);border-radius:8px;padding:6px 12px">⚠ SCORE CAPPED — Active Government Recall Found</div>`:''}
      </div>

      <!-- VEHICLE SUMMARY -->
      <div class="card" style="margin-bottom:16px">
        <div class="section-title">📋 Vehicle Summary</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:17px;font-weight:900">${S.car.year} ${S.car.make} ${S.car.model}</div>
          <div class="src-label"><div class="src-dot" style="background:${confidenceScore>=80?'var(--green)':'var(--amber)'}"></div>${confidenceLabel} Data</div>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px">Country: ${S.car.country||'USA'}${S.car.vin?` · VIN: <span style="font-family:var(--fm)">${S.car.vin}</span>`:''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted2);font-family:var(--fm)">Checks: ${v.checkLevel===2?'L1+L2':'L1 Only'}</span>
          <span style="font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted2);font-family:var(--fm)">Fails: ${v.fails}</span>
          <span style="font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted2);font-family:var(--fm)">Source: ${dbName}</span>
        </div>

        <!-- CONFIDENCE INDICATOR -->
        <div style="margin-top:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">DATA CONFIDENCE</div>
            <div style="font-size:10px;font-family:var(--fm);color:${confidenceScore>=80?'var(--green)':'var(--amber)'}">${confidenceScore}%</div>
          </div>
          <div class="confidence-bar"><div class="${confidenceScore>=80?'confidence-fill-high':confidenceScore>=50?'confidence-fill-med':'confidence-fill-low'}" style="width:${confidenceScore}%"></div></div>
          <div style="font-size:11px;color:var(--muted2);margin-top:5px">Last checked: ${timestamp}</div>
        </div>
      </div>

      <!-- OFFICIAL DATABASE STATUS -->
      ${layer1?`
      <div class="oracle-section" style="margin-bottom:14px">
        <div class="oracle-label">🏛️ Official Safety Records — ${dbName}</div>
        ${layer1.recalls&&layer1.recalls.length>0?`
          <div style="font-size:12px;color:var(--red);font-family:var(--fm);font-weight:700">⚠ ${layer1.recalls.length} ACTIVE RECALL${layer1.recalls.length>1?'S':''} ON FILE</div>

          ${S.nhtsa.recalls.slice(0,2).map(r=>`<div style="font-size:11px;color:var(--text2);margin-top:6px;padding:8px;background:rgba(239,68,68,0.08);border-radius:6px;">${r.Component||'Component'}: ${(r.Summary||'See NHTSA.gov for details').substring(0,100)}</div>`).join('')}

          <div style="font-size:11px;color:var(--muted2);margin-top:4px;line-height:1.6">No open recalls found, but complaints were filed by owners. Review checklist results carefully.</div>
        `:`
          <div style="font-size:12px;color:var(--green);font-family:var(--fm)">✓ No active recalls found in official database</div>
          <div style="font-size:11px;color:var(--muted2);margin-top:4px;line-height:1.6">We ran a live check. No open recalls. Good sign — always verify at nhtsa.gov</div>
        `}
        ${layer1.investigations&&layer1.investigations.length>0?`<div style="font-size:12px;color:var(--amber);font-family:var(--fm);margin-top:6px">⚠ ${layer1.investigations.length} Open Safety Investigation${layer1.investigations.length>1?'s':''}</div>`:''}

      <!-- MARKET PRICE ANALYSIS -->
      ${marketDelta&&marketDelta.optimalPrice?`
      <div class="card" style="margin-bottom:16px;border-color:rgba(45,212,191,0.3)">
        <div class="section-title">💰 Market Price Analysis</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">

          <div style="background:rgba(239,68,68,0.1);border-radius:var(--rs);padding:10px;text-align:center">
            <div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">REPAIR RISK</div>
            <div style="font-size:16px;font-weight:900;color:var(--red);margin-top:4px">-${marketDelta.repairCostsFormatted||'$0'}</div>

  function buildFromBackend() {

      card.classList.remove('pass', 'fail');

        b.classList.remove('pass-active', 'fail-active');
        if (b.dataset.val === val) b.classList.add(val === 'pass' ? 'pass-active' : 'fail-active');
      });
    }
    var activeItems = S.phase === 'checklist' ? S.checklist.filter(function(i){ return i.level === 1; }) : (S.phase === 'level2' ? S.checklist.filter(function(i){ return i.level === 2; }) : S.checklist.filter(function(i){ return i.level === 3; }));
    var done = activeItems.filter(function(i) { return S.answers[i.id]; }).length;
    var total = activeItems.length;
    var pct = total ? percent(done / total * 100) : 0;
    var ctr = byId('checkCounter'); if (ctr) ctr.textContent = done + '/' + total + ' checked';
    var pctEl = byId('checkPct'); if (pctEl) pctEl.textContent = pct + '%';
    var fill = byId('progressFill'); if (fill) fill.style.width = pct + '%';
    if (done === total) render();

  window.calcVerdict = function() {
    var allItems = S.checklist || [];
    var level1 = allItems.filter(function(i){ return i.level === 1; });
    var level2 = allItems.filter(function(i){ return i.level === 2; });
    var level3 = allItems.filter(function(i){ return i.level === 3; });
    var failed = allItems.filter(function(i){ return S.answers[i.id] === 'fail'; });
    var criticalFails = failed.filter(function(i){ return i.critical; });
    var recalls = (S.nhtsa && S.nhtsa.recalls ? S.nhtsa.recalls.length : 0) || (S.globalForensic && S.globalForensic.layer1 && S.globalForensic.layer1.recalls ? S.globalForensic.layer1.recalls.length : 0);
    var investigations = (S.globalForensic && S.globalForensic.layer1 && S.globalForensic.layer1.investigations ? S.globalForensic.layer1.investigations.length : 0);
    var score = 100;
    score -= failed.length * 8;
    score -= criticalFails.length * 22;
    if (recalls > 0) score -= 10 + Math.min(15, recalls * 4);
    if (investigations > 0) score -= 5 + Math.min(10, investigations * 3);
    if (score < 0) score = 0;

    var category = 'PROCEED';
    if (criticalFails.length > 0 || score < 45 || recalls > 0 && score < 60) category = 'STOP';
    else if (score < 65) category = 'CAUTION';
    else if (score < 85) category = 'NEGOTIATE';

    var marketDelta = (S.globalForensic && S.globalForensic.marketDelta) || {};
    var modelProfile = (S.globalForensic && S.globalForensic.dynamicChecklist && S.globalForensic.dynamicChecklist.modelProfile) || S.modelProfile || {};

    if (investigations) redFlags.push(investigations + ' open investigation' + (investigations > 1 ? 's' : ''));
    failedItems.slice(0, 6).forEach(function(item) { redFlags.push(item.title || item.label || item.detail); });

    S.verdict = {
      score: score,
      category: category,
      label: category,
      failedItems: failedItems,
      criticalFails: criticalFails.length,
      fails: failed.length,
      redFlags: redFlags,
      marketDelta: marketDelta,
      modelProfile: modelProfile,
      negotiation: negotiation,

    S.phase = 'loading';
    S.termLines = [];
    S.answers = {};
    S.globalForensic = null;
    S.checkLevel = 1;
    render();
    showTermOverlay();
    addOverlayLine('[CHECKING] CONNECTING TO OFFICIAL SAFETY DATABASES...');

    function fetchTimeout(url, ms) {
      ms = ms || 8000;
      var ctl = new AbortController();
      var id = setTimeout(function(){ ctl.abort(); }, ms);
      return fetch(url, {signal: ctl.signal}).finally(function(){ clearTimeout(id); });
    }

    try {
      var deductRes = await gasPost({action:'deduct', email:S.user.email, hash:S.user.hash});
      if (!deductRes.ok) { hideTermOverlay(); S.showTokenModal = true; S.phase = 'home'; render(); return; }
      S.user.tokens = deductRes.tokens;
      localStorage.setItem('cm_user', JSON.stringify(S.user));

      var recallRes = await fetchTimeout('https://api.nhtsa.gov/recalls/recallsByVehicle?make=' + esc(S.car.make) + '&model=' + esc(S.car.model) + '&modelYear=' + esc(S.car.year), 7000)

      S.nhtsa.recalls = recallRes.Results || recallRes.results || [];
      addOverlayLine('[CHECKING] GOVERNMENT RECALL RECORDS RETRIEVED...', 'done');

      var compRes = await fetchTimeout('https://api.nhtsa.gov/complaints/complaintsByVehicle?make=' + esc(S.car.make) + '&model=' + esc(S.car.model) + '&modelYear=' + esc(S.car.year), 7000)
        .then(function(r){ return r.json(); }).catch(function(){ return {results: []}; });
      S.nhtsa.complaints = compRes.results || [];
      addOverlayLine('[CHECKING] SCANNING OWNER COMPLAINT REPORTS...', 'done');

      if (S.car.vin && S.car.vin.length >= 10) {
        try {
          var vd = await fetchTimeout('https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVin/' + esc(S.car.vin) + '?format=json', 7000).then(function(r){ return r.json(); });
          if (vd && vd.Results) S.vinData = vd.Results;
          addOverlayLine('[CHECKING] VIN DECODE COMPLETE...', 'done');
        } catch (vinErr) {
          addOverlayLine('[INFO] VIN decode unavailable — continuing with the selected vehicle data.');
        }
      }

      addOverlayLine('[CHECKING] BUILDING VEHICLE PROFILE AND LEVEL CHECKS...');
      var forensicRes = await gasPost({
        action:'globalForensicAnalysis',
        year:S.car.year,
        make:S.car.make,
        model:S.car.model,
        country:S.car.country || 'USA',

      });

      buildChecklist();
      addOverlayLine('[CHECKING] CALCULATING LIVE PRICE AND NEGOTIATION LEVERAGE...');
      addOverlayLine('[DONE] ALL CHECKS COMPLETE — REPORT READY ✓', 'done');
      setTimeout(function(){ hideTermOverlay(); S.phase = 'checklist'; render(); }, 350);
    } catch (err) {
      addOverlayLine('[INFO] Live fetch failed — using fallback knowledge and official data where available.');

      setTimeout(function(){ hideTermOverlay(); S.phase = 'checklist'; render(); }, 500);

  };

          '<div style="font-size:26px;font-weight:900;color:' + color + ';letter-spacing:-0.5px;margin-bottom:10px">' + label + '</div>' +
          '<div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:12px">' + summary + '</div>' +
          '<div style="font-size:72px;font-weight:900;color:' + color + ';font-family:var(--fm);line-height:1;margin-bottom:4px">' + percent(v.score || 0) + '</div>' +
          '<div style="font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px">VERIFIED SCORE / 100</div>' +
        '</div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="section-title">Red flags first</div>' +
          redFlagHTML(redFlags) +
        '</div>' +

        '<div class="card" style="margin-bottom:16px;border-color:rgba(45,212,191,0.3)">' +
          '<div class="section-title">Prices and fair price</div>' +
          (hasMarket ? '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">MARKET AVG</div><div style="font-size:16px;font-weight:900;color:var(--text);margin-top:4px">' + money(marketDelta.avgPrice) + '</div></div><div style="background:rgba(239,68,68,0.1);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">REPAIR DEDUCTION</div><div style="font-size:16px;font-weight:900;color:var(--red);margin-top:4px">-' + money(repair) + '</div></div><div style="background:rgba(45,212,191,0.1);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">FAIR BUY PRICE</div><div style="font-size:16px;font-weight:900;color:var(--teal);margin-top:4px">' + money(fair) + '</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">OPENING OFFER</div><div style="font-size:16px;font-weight:900;color:var(--text);margin-top:4px">' + money(opening) + '</div></div><div style="background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:10px;font-family:var(--fm);color:var(--muted2);letter-spacing:1px">WALK-AWAY</div><div style="font-size:16px;font-weight:900;color:var(--red);margin-top:4px">' + money(walkAway) + '</div></div></div><div style="font-size:12px;color:var(--muted2);line-height:1.7">' + safe(sourceLine) + ' · confidence ' + confidence + '%</div>' : '<div class="err-box">Live market pricing was not verified well enough to show a number. The app failed closed instead of guessing.</div>') +
        '</div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="section-title">Negotiation leverage</div>' +
          (negotiation && negotiation.scripts && negotiation.scripts.length ? negotiation.scripts.map(function(s) {
            var cls = s.leverage === 'HIGH' ? '' : s.leverage === 'MEDIUM' ? 'medium' : 'standard';
            return '<div class="leverage-card ' + cls + '" style="margin-bottom:12px"><div class="leverage-badge ' + (s.leverage === 'HIGH' ? 'high' : s.leverage === 'MEDIUM' ? 'medium' : 'standard') + '">' + safe(s.leverage) + ' LEVERAGE</div><div style="font-size:12px;font-weight:800;color:var(--text);margin-bottom:8px">' + safe(s.headline) + '</div><div style="font-size:12px;color:var(--text2);line-height:1.7;font-style:italic;border-left:2px solid ' + (s.leverage === 'HIGH' ? 'var(--red)' : s.leverage === 'MEDIUM' ? 'var(--amber)' : 'var(--teal)') + ';padding-left:10px">' + safe(s.script) + '</div></div>';
          }).join('') : '<div class="ok-box">No special leverage was verified. Use a calm anchor and keep the offer simple.</div>') +
        '</div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="section-title">Model reputation</div>' +
          '<div style="font-size:16px;font-weight:900;margin-bottom:6px">' + safe(profile.reliabilityLabel || 'Unknown') + ' · ' + safe(profile.reliabilityScore || 0) + '/100</div>' +
          '<div style="font-size:12px;color:var(--text2);line-height:1.7">' + safe(profile.shortDescription || '') + '</div>' +
        '</div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="section-title">Inspection summary</div>' +
          '<div style="font-size:13px;color:var(--text2);line-height:1.7">' + safe(summary) + '</div>' +
          '<div style="font-size:12px;color:var(--muted2);margin-top:8px">Failures: ' + safe(v.fails || 0) + ' · Critical failures: ' + safe(v.criticalFails || 0) + ' · Level 1/2/3 counts: ' + safe((v.levelCounts && v.levelCounts.level1) || 0) + '/' + safe((v.levelCounts && v.levelCounts.level2) || 0) + '/' + safe((v.levelCounts && v.levelCounts.level3) || 0) + '</div>' +
        '</div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="section-title">Full checklist</div>' +
          '<details><summary style="cursor:pointer;font-weight:800">Collapsed by default</summary><div style="margin-top:12px">' + checklistSummaryHTML() + '</div></details>' +
        '</div>' +
      '</div>' +
    '</div>';
  };

  window.render = function() {
    var a = byId('app');
    if (!a) return;
    byId('fbBubble').style.display = (['splash','auth','verify2fa'].indexOf(S.phase) > -1) ? 'none' : 'flex';
    switch (S.phase) {
      case 'auth': a.innerHTML = renderAuth(); break;
      case 'verify2fa': a.innerHTML = renderVerify2FA(); break;
      case 'home': a.innerHTML = renderHome(); break;
      case 'input': a.innerHTML = renderInput(); break;
      case 'loading': a.innerHTML = renderLoading(); break;
      case 'checklist': a.innerHTML = renderChecklist(); break;
      case 'level2': a.innerHTML = renderLevel2(); break;
      case 'level3': a.innerHTML = renderLevel3(); break;
      case 'verdict': a.innerHTML = renderVerdict(); break;
      case 'account': a.innerHTML = renderAccount(); break;
      default: break;
    }
    var mo = document.querySelector('.modal-overlay'); if (mo) mo.remove();
    if (S.showTokenModal) renderTokenModal();
  };
})();
</script>
</body>
</html>
