<style>
:root{
  --bg:#060b14;--bg2:#0c1320;--card:#101928;--card2:#192233;
  --border:#1c2b3f;--border2:#243348;

  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--muted:#4a6080;--muted2:#637d9e;
  --text:#e2e8f0;--text2:#94a3b8;
  --fh:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:14px;--rs:8px;--sh:0 4px 24px rgba(0,0,0,0.5);

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
body{font-family:var(--fh);font-size:15px;line-height:1.5}
#app{max-width:460px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
select,input,button,textarea{font-family:inherit;font-size:15px}
select option{background:var(--bg2);color:var(--text)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--teal-glow)}50%{box-shadow:0 0 0 10px transparent}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp 0.38s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn 0.25s ease both}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.btn{width:100%;padding:17px;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.15s,transform 0.1s,background 0.2s;font-family:var(--fh)}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:var(--teal2)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-red{background:#ef444422;color:var(--red);border:1px solid #ef444430}
.btn:disabled{background:var(--card2);color:var(--muted);cursor:not-allowed;transform:none;opacity:1}
.inp{width:100%;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;transition:border-color 0.2s;font-family:var(--fh)}
.inp:focus{outline:none;border-color:var(--teal)}
.inp::placeholder{color:var(--muted)}
.inp:disabled{opacity:0.4;cursor:not-allowed}
.lbl{display:block;font-size:11px;font-family:var(--fm);color:var(--muted2);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.back-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;font-weight:700;padding:4px 0;display:flex;align-items:center;gap:6px;transition:color 0.2s;font-family:var(--fh)}
.back-btn:hover{color:var(--text)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--fm);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tag-red{background:#ef444420;color:var(--red);border:1px solid #ef444430}
.tag-amber{background:#f59e0b20;color:var(--amber);border:1px solid #f59e0b30}
.tag-green{background:#22c55e20;color:var(--green);border:1px solid #22c55e30}
.tag-teal{background:var(--teal-glow2);color:var(--teal);border:1px solid rgba(45,212,191,0.25)}
.err-box{background:#ef444412;border:1px solid #ef444430;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#fca5a5;line-height:1.5}
.ok-box{background:#22c55e12;border:1px solid #22c55e30;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#86efac;line-height:1.5}
.info-box{background:var(--teal-glow2);border:1px solid rgba(45,212,191,0.2);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--teal);line-height:1.5}

#topBar{position:sticky;top:0;z-index:100;background:rgba(6,11,20,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.token-badge{background:var(--teal-glow);border:1px solid rgba(45,212,191,0.35);border-radius:20px;padding:6px 13px;font-size:12px;font-family:var(--fm);color:var(--teal);cursor:pointer;white-space:nowrap;transition:background 0.2s}
.token-badge:hover{background:rgba(45,212,191,0.2)}
#fbBubble{position:fixed;bottom:24px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 20px rgba(45,212,191,0.35);transition:transform 0.2s;animation:pulse 3s ease infinite}

#fbPanel{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;z-index:300;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 32px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.16,1,.3,1)}

#fbOverlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.65);opacity:0;pointer-events:none;transition:opacity 0.3s}
#fbOverlay.open{opacity:1;pointer-events:all}
#installBar{display:none;background:var(--teal-glow2);border-bottom:1px solid rgba(45,212,191,0.2);padding:10px 20px;text-align:center;font-size:13px;cursor:pointer;color:var(--teal)}
#installBar.visible{display:block}

#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
.splash-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:44px 44px;opacity:0.25}

.splash-title{font-size:34px;font-weight:900;color:var(--teal);letter-spacing:-1.5px;margin-top:18px;font-family:var(--fh)}

.terminal{background:#01080a;border:1px solid #0c2a1a;border-radius:var(--r);padding:18px;font-family:var(--fm);font-size:12px;overflow-y:auto;line-height:2;flex:1;min-height:260px}
.term-line{display:flex;gap:8px;align-items:flex-start}
.term-prompt{color:#16522a;flex-shrink:0}
.term-text{color:#22c55e}
.term-text.done{color:#4ade80}
.term-cursor{display:inline-block;animation:blink 0.9s infinite;color:#22c55e}

.auth-tab{display:flex;background:var(--card);border-radius:var(--r);padding:4px;margin-bottom:22px}
.auth-tab button{flex:1;padding:11px;border:none;border-radius:var(--rs);background:transparent;color:var(--muted2);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--fh)}
.auth-tab button.active{background:var(--teal);color:#000}

.progress-bar{height:4px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--teal));border-radius:4px;transition:width 0.4s ease}

/* ── CHECK CARDS: key fix — pointer-events always on, no re-render ── */
.check-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color 0.2s,background 0.2s}
.check-card.pass{border-color:rgba(34,197,94,0.45)!important;background:rgba(34,197,94,0.04)!important}
.check-card.fail{border-color:rgba(239,68,68,0.45)!important;background:rgba(239,68,68,0.04)!important}
.check-btn{padding:14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg2);color:var(--muted2);font-weight:800;font-size:14px;cursor:pointer;width:100%;transition:all 0.18s;font-family:var(--fh);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.check-btn:active{transform:scale(0.96)}
.check-btn.pass-active{background:var(--green)!important;border-color:var(--green)!important;color:#000!important}
.check-btn.fail-active{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}

.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:24px 20px 44px;width:100%;max-width:460px;animation:slideUp 0.35s cubic-bezier(.16,1,.3,1)}
.pack-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}
.pack-card:hover{border-color:var(--teal)}
.pack-card.featured{border-color:var(--teal);background:var(--teal-glow2)}
.popular-badge{position:absolute;top:-10px;right:16px;background:var(--teal);color:#000;font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px;font-family:var(--fm);letter-spacing:0.5px}

.section-title{font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:18px 0}
.acct-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.acct-row:last-child{border-bottom:none}
</style>
</head>

// Repair cost lookup by keyword
function getRepairCost(label) {
  const l = label.toLowerCase();
  if (l.includes('head gasket')) return {label:'Head Gasket',min:1200,max:2800};
  if (l.includes('timing chain')||l.includes('timing belt')) return {label:'Timing Chain/Belt',min:800,max:2000};
  if (l.includes('cvt')) return {label:'CVT Replacement',min:3500,max:8000};
  if (l.includes('transmission')||l.includes('gearbox')) return {label:'Transmission Rebuild/Replace',min:2500,max:8000};
  if (l.includes('engine')||l.includes('motor')) return {label:'Engine Repair',min:1500,max:8000};
  if (l.includes('air suspension')) return {label:'Air Suspension',min:800,max:3500};
  if (l.includes('rust')||l.includes('frame rust')) return {label:'Rust/Frame Repair',min:500,max:5000};
  if (l.includes('lifter')||l.includes('afm')||l.includes('mds')) return {label:'Lifter/AFM Repair',min:2000,max:5000};
  if (l.includes('ims')||l.includes('bearing')) return {label:'IMS/Bearing Repair',min:2000,max:6000};
  if (l.includes('turbo')) return {label:'Turbo Repair',min:1000,max:3500};
  if (l.includes('brake')) return {label:'Complete Brake Job',min:400,max:1200};
  if (l.includes('suspension')) return {label:'Suspension Repair',min:500,max:2000};
  if (l.includes('electrical')) return {label:'Electrical Diagnosis/Repair',min:300,max:1500};
  return null;
}

// Lookup KB issues for a car
function getKBIssues(make, model) {
  const makeKey = Object.keys(KB).find(k => k.toUpperCase() === make.toUpperCase());
  if (!makeKey) return {issues:[], modelData:null};
  const makeData = KB[makeKey];
  const issues = [];
  if (makeData._) issues.push(...makeData._.map((l,i) => ({id:'kb_g_'+i, cat:'Known Issue', label:l, critical:l.includes('🚨')||l.includes('⚠️')})));
  const normMod = model.toUpperCase().replace(/[^A-Z0-9]/g,'');
  const modelKey = Object.keys(makeData).find(k => {
    if (k === '_') return false;
    const nk = k.toUpperCase().replace(/[^A-Z0-9]/g,'');
    return normMod.includes(nk) || nk.includes(normMod) || normMod === nk;
  });
  if (!modelKey) return {issues, modelData:null};
  return {issues, modelData: makeData[modelKey]};
}

function getYearRangeIssues(modelData, year) {
  const yr = parseInt(year);
  for (const range of Object.keys(modelData)) {
    const [s,e] = range.split(':').map(Number);
    if (yr >= s && yr <= e) {
      return modelData[range].map((l,i) => ({id:'kb_m_'+i, cat:'Model-Specific', label:l, critical:l.includes('🚨')||l.includes('⚠️')}));
    }
  }
  return [];
}

async function hashPass(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('CARZ2025_'+p));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

  try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; }

}

async function gasPost(data) {
  try {

}

function isNewDevice(email) {
  return !localStorage.getItem('cm_dev_'+btoa(email));
}
function markDevice(email) {
  localStorage.setItem('cm_dev_'+btoa(email), '1');
}

async function handleAuth() {
  const email = ($('authEmail')?.value||'').trim().toLowerCase();
  const pass  = ($('authPass')?.value||'');
  S.authErr = ''; S.authOk = '';
  if (!email || !pass) { S.authErr='Fill in all fields.'; render(); return; }
  if (S.authMode==='signup' && pass!==($('authPass2')?.value||'')) { S.authErr='Passwords do not match.'; render(); return; }
  if (pass.length < 6) { S.authErr='Password must be at least 6 characters.'; render(); return; }

  S.authLoading = true; render();
  const hash = await hashPass(pass);
  const ip   = await getUserIP();
  const res  = await gasPost({action:S.authMode, email, hash, ip});
  S.authLoading = false;

  if (!res.ok) { S.authErr = res.error||'Authentication failed.'; render(); return; }

  // 2FA check — new device gets OTP
  if (S.authMode === 'login' && isNewDevice(email)) {
    S._pending = {email, hash, tokens:res.tokens, joined:res.joined||''};
    const otpRes = await gasPost({action:'sendOTP', email, type:'verify'});
    if (!otpRes.ok) { S.authErr='Could not send verification email: '+(otpRes.error||''); render(); return; }
    S.phase = 'verify2fa'; render();
    return;
  }

  S.user = {email, hash, tokens:res.tokens, joined:res.joined||''};
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  markDevice(email);
  S.phase = 'home'; render();
}

async function handle2FA() {
  const otp = ($('otpInput')?.value||'').trim();
  if (!otp||otp.length!==6) { S.authErr='Enter the 6-digit code.'; render(); return; }
  S.authLoading = true; render();
  const res = await gasPost({action:'verifyOTP', email:S._pending.email, otp});
  S.authLoading = false;
  if (!res.ok) { S.authErr = res.error||'Invalid code.'; render(); return; }
  S.user = S._pending;
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  markDevice(S._pending.email);
  S._pending = null;
  S.phase = 'home'; render();
}

async function startAnalysis() {
  if (!S.car.year||!S.car.make||!S.car.model) { alert('Please fill in all vehicle fields.'); return; }
  if (S.user.tokens<=0) { S.showTokenModal=true; render(); return; }

  S.phase='loading'; S.termLines=['Initializing Global Oracle...']; S.answers={}; render();

  let ti=0;
  const termTimer = setInterval(()=>{
    if (ti<TERM_LINES.length) {
      S.termLines.push(TERM_LINES[ti++]);
      const tb=$('termBox'); if(tb){tb.innerHTML=buildTermHTML();tb.scrollTop=tb.scrollHeight;}
    }
  }, 700);

  const fetchTimeout = (url, ms=7000) => {
    const ctl = new AbortController();
    const id  = setTimeout(()=>ctl.abort(), ms);
    return fetch(url,{signal:ctl.signal}).finally(()=>clearTimeout(id));
  };

  try {
    const deductRes = await gasPost({action:'deduct', email:S.user.email, hash:S.user.hash});
    if (!deductRes.ok) { clearInterval(termTimer); S.showTokenModal=true; S.phase='home'; render(); return; }
    S.user.tokens = deductRes.tokens; localStorage.setItem('cm_user',JSON.stringify(S.user));

    const [recallRes, compRes] = await Promise.all([
      fetchTimeout(`https://api.nhtsa.gov/recalls/recallsByVehicle?make=${esc(S.car.make)}&model=${esc(S.car.model)}&modelYear=${S.car.year}`)
        .then(r=>r.json()).catch(()=>({Results:[]})),
      fetchTimeout(`https://api.nhtsa.gov/complaints/complaintsByVehicle?make=${esc(S.car.make)}&model=${esc(S.car.model)}&modelYear=${S.car.year}`)
        .then(r=>r.json()).catch(()=>({results:[]}))
    ]);

    S.nhtsa.recalls    = recallRes.Results||[];
    S.nhtsa.complaints = compRes.results||[];

    buildChecklist();

    const elapsed = S.termLines.length * 700;
    const wait    = Math.max(0, 4000 - elapsed);
    setTimeout(()=>{ clearInterval(termTimer); S.phase='checklist'; render(); }, wait);

  } catch(err) {
    clearInterval(termTimer);
    S.termLines.push('Connection issue — using offline data...');
    buildChecklist();
    setTimeout(()=>{ S.phase='checklist'; render(); }, 1500);
  }
}

function buildChecklist() {
  let items = [...UNIVERSAL];

  if (S.nhtsa.recalls.length>0) {
    items.splice(2,0,{
      id:'recall1', critical:true, cat:'Federal Recall ⚠️',
      badge:`${S.nhtsa.recalls.length} open government recall${S.nhtsa.recalls.length>1?'s':''}`,
      label:`FEDERAL RECALL: ${S.nhtsa.recalls[0].Component||'Safety issue'} — ${(S.nhtsa.recalls[0].Summary||'Confirm ALL recalls have been completed by a dealer').substring(0,120)}...`
    });
  }

  const compCats = {};
  (S.nhtsa.complaints||[]).forEach(c=>{
    const comp = (c.components||'').toLowerCase();
    if (comp.includes('engine')||comp.includes('fuel'))   compCats.engine=true;
    if (comp.includes('transmission')||comp.includes('driveline')) compCats.trans=true;
    if (comp.includes('brakes'))                           compCats.brakes=true;
    if (comp.includes('electrical')||comp.includes('wiring')) compCats.elec=true;
    if (comp.includes('steering'))                         compCats.steer=true;
    if (comp.includes('suspension'))                       compCats.susp=true;
  });
  if (S.nhtsa.complaints.length>5 && compCats.engine)
    items.push({id:'nhtsa_eng',critical:true,cat:'NHTSA Data',badge:'Multiple owner complaints',label:`ENGINE: This ${S.car.year} ${S.car.make} ${S.car.model} has multiple federal complaints about engine/fuel issues. Inspect engine very carefully.`});
  if (S.nhtsa.complaints.length>5 && compCats.trans)
    items.push({id:'nhtsa_tr',critical:true,cat:'NHTSA Data',badge:'Multiple owner complaints',label:`TRANSMISSION: Multiple owner complaints on this model. Test all gears and shifting behavior extensively.`});
  if (compCats.steer)
    items.push({id:'nhtsa_st',critical:false,cat:'NHTSA Data',label:`STEERING: Owner complaints about steering on this model. Check for play, pulling, or vibration during test drive.`});

  const kbResult = getKBIssues(S.car.make, S.car.model);
  if (kbResult && kbResult.issues) {
    kbResult.issues.forEach((item,i) => {
      items.push({id:'kbg'+i, critical:item.critical, cat:'Make-Known Issue', label:item.label, badge:item.critical?'Known Issue':null});
    });
    if (kbResult.modelData) {
      const yearIssues = getYearRangeIssues(kbResult.modelData, S.car.year);
      yearIssues.forEach((item,i) => {
        items.push({id:'kbm'+i, critical:item.critical, cat:'Model+Year Specific', label:item.label, badge:item.critical?'Verified Issue':null});
      });
    }
  }

  S.checklist = items.map((item,i)=>({...item, id:item.id||'i'+i}));
}

function calcVerdict() {
  const fails = Object.values(S.answers).filter(v=>v==='fail').length;
  const critFails = S.checklist.filter(i=>i.critical&&S.answers[i.id]==='fail').length;
  let score = 100-(fails*12)-(critFails*25); if(score<0)score=0;
  const failedItems = S.checklist.filter(i=>S.answers[i.id]==='fail');
  S.verdict = {score, buy:score>=78&&critFails===0, neg:score>=45&&critFails<=1, fails, critFails, failedItems};
  S.phase='verdict'; render();
}

// ═══════════════════════════════════════════════════
// CHECKLIST ANSWER HANDLER — event delegation fix
// ═══════════════════════════════════════════════════
function handleCheckAnswer(itemId, val) {
  S.answers[itemId] = val;
  // Update DOM directly without full re-render — this is the key fix
  const card = document.querySelector(`.check-card[data-id="${itemId}"]`);
  if (card) {
    card.classList.remove('pass','fail');
    if (val) card.classList.add(val);
    card.querySelectorAll('.check-btn').forEach(b => {
      b.classList.remove('pass-active','fail-active');
      if (b.dataset.val === val) b.classList.add(val === 'pass' ? 'pass-active' : 'fail-active');
    });
  }
  // Update progress counter
  const done = Object.keys(S.answers).length;
  const total = S.checklist.length;
  const pct = Math.round(done/total*100)||0;
  const ctr = $('checkCounter');
  if (ctr) ctr.textContent = `${done}/${total} checked`;
  const pctEl = $('checkPct');
  if (pctEl) pctEl.textContent = `${pct}%`;
  const fill = $('progressFill');
  if (fill) fill.style.width = pct+'%';
  // Enable verdict button when all done
  const verdBtn = $('verdictBtn');
  if (verdBtn) {
    if (done === total) {
      verdBtn.disabled = false;
      verdBtn.className = 'btn btn-primary';
      verdBtn.textContent = 'Get Verdict →';
    } else {
      verdBtn.disabled = true;
      verdBtn.className = 'btn';
      verdBtn.textContent = `Answer all ${total-done} remaining checks`;
    }
  }
}

function render() {
  const a = $('app');
  $('fbBubble').style.display = (['splash','auth','verify2fa'].includes(S.phase))?'none':'flex';
  switch(S.phase) {
    case 'auth':       a.innerHTML = renderAuth();       break;
    case 'verify2fa':  a.innerHTML = renderVerify2FA();  break;
    case 'home':       a.innerHTML = renderHome();       break;
    case 'input':      a.innerHTML = renderInput();      break;
    case 'loading':    a.innerHTML = renderLoading();    break;
    case 'checklist':  a.innerHTML = renderChecklist();  break;
    case 'verdict':    a.innerHTML = renderVerdict();    break;
    case 'account':    a.innerHTML = renderAccount();    break;
  }
  const mo = document.querySelector('.modal-overlay'); if(mo) mo.remove();
  if(S.showTokenModal) renderTokenModal();
}

          </div>
          ${i.badge&&i.badge!=='null'?`<div style="font-size:11px;font-family:var(--fm);color:var(--amber);font-weight:700;margin-bottom:8px">⚠ ${i.badge}</div>`:''}
          <div style="font-size:13px;line-height:1.65;margin-bottom:14px;color:var(--text)">${i.label}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <button class="check-btn ${ans==='pass'?'pass-active':''}" data-val="pass" onclick="handleCheckAnswer('${i.id}','pass')">✓ Pass</button>
            <button class="check-btn ${ans==='fail'?'fail-active':''}" data-val="fail" onclick="handleCheckAnswer('${i.id}','fail')">✗ Fail</button>
          </div>
        </div>`;
      }).join('')}
      <button id="verdictBtn" class="btn ${done===total?'btn-primary':''}" ${done!==total?'disabled':''} style="padding:21px;margin-top:8px;font-size:17px" onclick="calcVerdict()">
        ${done===total?'Get Verdict →':`Answer all ${total-done} remaining checks`}
      </button>
    </div>
  </div>`;
}

// ─── VERDICT SCREEN ──────────────────────────────────
function renderVerdict() {
  const v=S.verdict;
  const vc = v.buy?'var(--green)':v.neg?'var(--amber)':'var(--red)';
  const icon = v.buy?'✅':v.neg?'⚠️':'🚫';
  const label = v.buy?'BUY THIS CAR':v.neg?'NEGOTIATE HARD':'WALK AWAY';
  const msg = v.buy
    ? `Clean bill of health. This car passed all critical checks. Proceed with confidence.`
    : v.neg
    ? `${v.critFails} critical and ${v.fails} total issues found. Use the failed checks below as leverage to negotiate the price down.`
    : `${v.critFails} critical failure${v.critFails!==1?'s':''} found. The risk and repair costs outweigh this car's value at the asking price.`;

  const disc = v.score>=78?3:v.score>=60?10:v.score>=45?20:30;

  let minCost=0, maxCost=0;
  v.failedItems.forEach(item=>{
    const rc=getRepairCost(item.label);
    if(rc){minCost+=rc.min;maxCost+=rc.max;}
  });

  return `<div class="fade-up">
    <div id="topBar">
      <button class="back-btn" onclick="S.phase='checklist';render()">← Back to Checklist</button>
    </div>
    <div style="padding:20px 20px 80px">

      <div class="card" style="border-color:${vc}55;text-align:center;padding:28px 20px;margin-bottom:16px">
        <div style="font-size:48px;margin-bottom:10px">${icon}</div>
        <div style="font-size:28px;font-weight:900;color:${vc};letter-spacing:-0.5px;margin-bottom:10px">${label}</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px">${msg}</div>
        <div style="font-size:72px;font-weight:900;color:${vc};font-family:var(--fm);line-height:1;margin-bottom:4px">${v.score}</div>
        <div style="font-size:11px;font-family:var(--fm);color:var(--muted2);letter-spacing:2px">ORACLE SCORE / 100</div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="section-title">💰 Price Negotiation Strategy</div>
        <div style="background:${vc}15;border:1px solid ${vc}30;border-radius:var(--rs);padding:14px;margin-bottom:12px">
          <div style="font-size:13px;color:var(--text2);line-height:1.7">
            Based on this inspection score, ${v.buy?'you are in a FAIR position — pay within 3% of asking price.':v.neg?`negotiate <strong style="color:${vc}">${disc}–${disc+5}% BELOW the asking price</strong>. Use each failed check as a specific argument.`:`demand at least <strong style="color:${vc}">${disc}% BELOW asking price</strong> or walk away. The repairs alone could cost more than your discount.`}
          </div>
        </div>
        ${minCost>0?`
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Estimated repair costs for issues found:</div>
        <div style="background:var(--bg2);border-radius:var(--rs);padding:12px;font-family:var(--fm);font-size:13px;color:var(--red)">
          $${minCost.toLocaleString()} – $${maxCost.toLocaleString()} <span style="font-size:11px;color:var(--muted2)">(rough estimate)</span>
        </div>`:''}
        <div style="margin-top:14px;font-size:12px;color:var(--muted2);line-height:1.7">
          💡 Check current market value on <a href="https://kbb.com" target="_blank" style="color:var(--teal)">KBB.com</a> or <a href="https://edmunds.com" target="_blank" style="color:var(--teal)">Edmunds.com</a> — then apply your discount from the fair market price.
        </div>
      </div>

      ${v.failedItems.length>0?`
      <div class="card" style="margin-bottom:16px">
        <div class="section-title">❌ Failed Checks (${v.failedItems.length})</div>
        ${v.failedItems.map(item=>{
          const rc=getRepairCost(item.label);
          return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span class="tag ${item.critical?'tag-red':'tag-amber'}">${item.critical?'CRITICAL':'WARNING'}</span>
              ${rc?`<span style="font-size:11px;font-family:var(--fm);color:var(--muted2)">Est. $${rc.min.toLocaleString()}–$${rc.max.toLocaleString()}</span>`:''}
            </div>
            <div style="font-size:12px;color:var(--text2);line-height:1.6">${item.label.substring(0,150)}${item.label.length>150?'...':''}</div>
          </div>`;
        }).join('')}
      </div>`:''} 

      <button class="btn btn-primary" style="margin-bottom:10px;padding:18px" onclick="S.phase='input';S.car={year:'',make:'',model:''};S.answers={};S.verdict=null;render()">🔍 Analyze Another Car</button>
      <button class="btn btn-ghost" style="padding:18px" onclick="S.showTokenModal=true;render()">🎯 Top Up Tokens</button>

    </div>
  </div>`;
}

// ─── ACCOUNT SCREEN ──────────────────────────────────
function renderAccount() {
  if (S.acctSub==='changePass') return renderChangePass();
  return `<div class="fade-up">
    <div id="topBar">
      <button class="back-btn" onclick="S.phase='home';render()">← Back</button>
      <div style="font-size:14px;font-weight:800;color:var(--teal)">My Account</div>
    </div>
    <div style="padding:20px 20px 80px">
      ${S.acctOk?`<div class="ok-box" style="margin-bottom:16px">✓ ${S.acctOk}</div>`:''}
      ${S.acctErr?`<div class="err-box" style="margin-bottom:16px">${S.acctErr}</div>`:''}

      <div class="card" style="margin-bottom:16px">
        <div class="section-title">Account Details</div>
        <div class="acct-row">
          <div style="font-size:13px;color:var(--muted2)">Email</div>
          <div style="font-size:13px;font-weight:700;font-family:var(--fm)">${S.user.email}</div>
        </div>
        <div class="acct-row">
          <div style="font-size:13px;color:var(--muted2)">Member Since</div>
          <div style="font-size:13px;font-weight:700;font-family:var(--fm)">${S.user.joined||'—'}</div>
        </div>
        <div class="acct-row">
          <div style="font-size:13px;color:var(--muted2)">Tokens Remaining</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:16px;font-weight:900;color:var(--teal);font-family:var(--fm)">${S.user.tokens}</div>
            <button onclick="refreshTokens()" style="background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted2);font-size:11px;padding:3px 10px;cursor:pointer;font-family:var(--fm)">↻ Refresh</button>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="section-title">Security</div>
        <div style="background:var(--teal-glow2);border:1px solid rgba(45,212,191,0.2);border-radius:var(--rs);padding:12px;font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7">
          🛡️ <strong style="color:var(--teal)">Device Verification is Active.</strong> Any login from a new device or browser will require a one-time email code — even if someone knows your password.
        </div>
        <button class="btn btn-ghost" style="margin-bottom:10px;font-size:14px;padding:15px" onclick="S.acctSub='changePass';S.acctErr='';S.acctOk='';render()">🔑 Change Password</button>
        <button class="btn" style="padding:15px;font-size:14px;background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)" onclick="resetDevices()">📵 Sign Out All Devices</button>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="section-title">Token Management</div>
        <button class="btn btn-primary" style="margin-bottom:10px;font-size:14px;padding:15px" onclick="S.showTokenModal=true;render()">🎯 Buy More Tokens</button>
      </div>

      <div class="card" style="border-color:rgba(239,68,68,0.25)">
        <div class="section-title" style="color:var(--red)">Danger Zone</div>
        <button class="btn btn-ghost" style="margin-bottom:10px;font-size:14px;padding:15px" onclick="logout()">🚪 Sign Out</button>
        <button class="btn btn-red" style="font-size:14px;padding:15px" onclick="handleDeleteAccount()">🗑️ Delete My Account</button>
      </div>
    </div>
  </div>`;
}

function resetDevices() {
  localStorage.removeItem('cm_dev_'+btoa(S.user.email));
  alert('All devices have been signed out. You will need to verify again on next login.');
}

function renderChangePass() {
  return `<div class="fade-up">
    <div id="topBar">
      <button class="back-btn" onclick="S.acctSub='main';S.acctErr='';render()">← Back</button>
      <div style="font-size:14px;font-weight:800">Change Password</div>
    </div>
    <div style="padding:20px 20px 60px">
      ${S.acctErr?`<div class="err-box" style="margin-bottom:14px">${S.acctErr}</div>`:''}
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label class="lbl">Current Password</label><input id="chgOld" class="inp" type="password" placeholder="Your current password"></div>
        <div><label class="lbl">New Password</label><input id="chgNew1" class="inp" type="password" placeholder="New password (6+ characters)"></div>
        <div><label class="lbl">Confirm New Password</label><input id="chgNew2" class="inp" type="password" placeholder="Repeat new password"></div>
      </div>
      <button class="btn btn-primary" style="margin-top:20px;padding:18px" onclick="handleChangePass()" ${S.authLoading?'disabled':''}>
        ${S.authLoading?'⏳ Saving...':'Save New Password →'}
      </button>
    </div>
  </div>`;
}

// ─── TOKEN MODAL ────────────────────────────────────
function renderTokenModal() {
  const packs = [
    {url:CFG.GUMROAD.PACK10,  name:'Starter',  tokens:10,  price:'$2.99',  desc:'10 searches — occasional buyers'},
    {url:CFG.GUMROAD.PACK50,  name:'Pro',       tokens:50,  price:'$9.99',  desc:'50 searches — best value', featured:true},
    {url:CFG.GUMROAD.PACK200, name:'Dealer',    tokens:200, price:'$29.99', desc:'200 searches — agents & dealers'},
  ];
  const ol=document.createElement('div'); ol.className='modal-overlay';
  ol.onclick=e=>{if(e.target===ol){S.showTokenModal=false;render();}};
  ol.innerHTML=`<div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:22px;font-weight:900">🎯 Top Up Tokens</div>
      <button onclick="S.showTokenModal=false;render()" style="background:none;border:none;color:var(--muted2);font-size:26px;cursor:pointer;line-height:1">×</button>
    </div>
    <div style="font-size:13px;color:var(--muted2);margin-bottom:18px">Tokens are credited to your account automatically after purchase.</div>
    ${packs.map(p=>{
      const url=`${p.url}?email=${esc(S.user?.email||'')}`;
      return `<div class="pack-card ${p.featured?'featured':''}" onclick="window.open('${url}','_blank')">
        ${p.featured?'<div class="popular-badge">🔥 MOST POPULAR</div>':''}
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:900;font-size:17px">${p.name} Pack</div>
            <div style="font-size:13px;color:var(--text2);margin-top:3px">${p.tokens} searches — ${p.desc}</div>
          </div>
          <div style="font-size:24px;font-weight:900;color:var(--teal);flex-shrink:0">${p.price}</div>
        </div>
      </div>`;
    }).join('')}
    <div style="font-size:11px;color:var(--muted2);text-align:center;margin-top:8px;line-height:1.7">
      Powered by Gumroad. Secure checkout. Tokens auto-credited after purchase.<br>
      <button onclick="refreshTokens();S.showTokenModal=false;render()" style="background:none;border:none;color:var(--teal);font-size:11px;cursor:pointer;text-decoration:underline;margin-top:4px;font-family:var(--fm)">Already purchased? Tap here to refresh →</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
}

// ─── FEEDBACK ────────────────────────────────────────
function openFeedback(){$('fbPanel').classList.add('open');$('fbOverlay').classList.add('open');}
function closeFeedback(){$('fbPanel').classList.remove('open');$('fbOverlay').classList.remove('open');}
async function submitFeedback(){
  const msg=$('fbText').value; if(!msg)return;
  $('fbStatus').textContent='Sending...';
  await gasPost({action:'feedback', email:S.user?.email||'Anonymous', message:msg});
  $('fbStatus').textContent='✓ Sent! Thank you.'; $('fbText').value='';
  setTimeout(closeFeedback,2000);
}
$('fbBubble').onclick=openFeedback;

// ─── PWA / INSTALL ───────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  $('installBar').classList.add('visible');
});
function installPWA(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;$('installBar').classList.remove('visible');}
  else { alert('To install:\n📱 iOS: Tap Share → "Add to Home Screen"\n🤖 Android: Tap the menu (⋮) → "Add to Home Screen"'); }
}

// ─── BOOT ────────────────────────────────────────────
window.onload=()=>{
  const saved=localStorage.getItem('cm_user');
  if(saved){try{S.user=JSON.parse(saved);S.phase='home';}catch{S.phase='auth';}}
  else{S.phase='auth';}
  setTimeout(()=>{$('splash').style.opacity='0';setTimeout(()=>$('splash').style.display='none',500);render();},1800);
};
</script>
</body>
</html>
