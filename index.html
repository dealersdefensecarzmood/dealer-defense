<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DealerDefense™ by CARZMOOD</title>
<meta name="description" content="Never get ripped off buying a used car. Real federal data. Real verdict.">
<meta name="theme-color" content="#060b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DealerDefense">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<!-- Gumroad Overlay Script -->
<script src="https://gumroad.com/js/gumroad.js" async></script>
<style>
:root{
  --bg:#060b14; --bg2:#0d1420; --card:#111928; --card2:#1a2235;
  --border:#1e2d45; --border2:#263650;
  --teal:#2dd4bf; --teal2:#14b8a6; --teal-glow:#2dd4bf22;
  --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --muted:#4b6080;
  --text:#e2e8f0; --text2:#94a3b8;
  --font-head:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --r:12px; --r-sm:8px; --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
body{font-family:var(--font-head);font-size:15px}
#app{max-width:460px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
select,input,button,textarea{font-family:inherit;font-size:15px}
select option{background:var(--bg2);color:var(--text)}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--teal-glow)}50%{box-shadow:0 0 0 8px transparent}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp 0.35s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn 0.25s ease both}

/* Components */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.btn{width:100%;padding:17px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:opacity 0.15s,transform 0.1s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:var(--teal2)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn:disabled{background:var(--card2);color:var(--muted);cursor:not-allowed;transform:none}
.inp{width:100%;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;transition:border-color 0.2s}
.inp:focus{outline:none;border-color:var(--teal)}
.inp::placeholder{color:var(--muted)}
.inp:disabled{opacity:0.4;cursor:not-allowed}
.lbl{display:block;font-size:11px;font-family:var(--font-mono);color:var(--muted);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;font-family:var(--font-head);padding:4px 0;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.back-btn:hover{color:var(--text)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--font-mono);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tag-red{background:#ef444422;color:var(--red)}
.tag-amber{background:#f59e0b22;color:var(--amber)}
.tag-green{background:#22c55e22;color:var(--green)}
.tag-teal{background:var(--teal-glow);color:var(--teal)}
.err-box{background:#ef444410;border:1px solid #ef444430;border-radius:var(--r-sm);padding:12px;font-size:13px;color:var(--red);text-align:center}

/* Top Bar & Bubble */
#topBar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.token-badge{background:var(--teal-glow);border:1px solid var(--teal);border-radius:20px;padding:5px 12px;font-size:12px;font-family:var(--font-mono);color:var(--teal);cursor:pointer;white-space:nowrap}
#fbBubble{position:fixed;bottom:24px;right:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(45,212,191,0.4);transition:transform 0.2s;animation:pulse 3s ease infinite}
#fbBubble:hover{transform:scale(1.1)}
#fbPanel{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;z-index:300;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.16,1,.3,1)}
#fbPanel.open{transform:translateY(0)}
#fbOverlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity 0.3s}
#fbOverlay.open{opacity:1;pointer-events:all}
#installBar{display:none;background:var(--teal-glow);border-bottom:1px solid var(--teal);padding:10px 20px;text-align:center;font-size:13px;cursor:pointer}
#installBar.visible{display:block}

/* Splash & Terminal */
#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
.splash-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.3}
.logo-ring{width:80px;height:80px;border-radius:20px;background:var(--teal-glow);border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;animation:pulse 2s ease infinite}
.splash-title{font-size:32px;font-weight:800;color:var(--teal);letter-spacing:-1px;margin-top:16px;font-family:var(--font-head)}
.terminal{background:#010a02;border:1px solid #0d3311;border-radius:var(--r);padding:16px;font-family:var(--font-mono);font-size:12px;overflow-y:auto;line-height:1.9;flex:1;min-height:260px}
.term-line{display:flex;gap:8px;align-items:flex-start}
.term-prompt{color:#1a5c1a;flex-shrink:0}
.term-text{color:#22c55e}
.term-text.complete{color:#4ade80}
.term-cursor{display:inline-block;animation:blink 0.9s infinite;color:#22c55e}

/* Layouts */
.auth-tab{display:flex;background:var(--card);border-radius:var(--r);padding:4px;margin-bottom:24px}
.auth-tab button{flex:1;padding:10px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.auth-tab button.active{background:var(--teal);color:#000}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:18px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.progress-bar{height:4px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width 0.3s ease}
.check-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color 0.2s}
.check-card.pass{border-color:#22c55e55}
.check-card.fail{border-color:#ef444455}
.check-btn{padding:11px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;width:100%;transition:all 0.15s;font-family:var(--font-head)}
.check-btn.pass-active{background:#22c55e;border-color:#22c55e;color:#000}
.check-btn.fail-active{background:#ef4444;border-color:#ef4444;color:#fff}
.data-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.data-cell{background:var(--bg2);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:460px;margin:0 auto;animation:slideUp 0.35s cubic-bezier(.16,1,.3,1)}
.pack-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s}
.pack-card:hover,.pack-card.featured{border-color:var(--teal)}
.pack-card.featured{background:var(--teal-glow)}
</style>
</head>
<body>

<div id="installBar">📲 Tap to add DealerDefense to your Home Screen</div>

<div id="splash">
  <div class="splash-grid"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
    <div class="logo-ring">🛡️</div>
    <div class="splash-title">DealerDefense</div>
    <div style="font-size:11px;font-family:var(--font-mono);color:var(--muted);letter-spacing:3px;margin-top:6px">BY CARZMOOD</div>
    <div style="font-size:11px;font-family:var(--font-mono);color:var(--muted);margin-top:24px;" id="splashMsg">Initializing...</div>
  </div>
</div>

<div id="app"></div>

<button id="fbBubble" title="Send feedback">💬</button>
<div id="fbOverlay" onclick="closeFeedback()"></div>
<div id="fbPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <div style="font-size:18px;font-weight:800">Quick Feedback</div>
    <button onclick="closeFeedback()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer">×</button>
  </div>
  <textarea id="fbText" class="inp" rows="4" placeholder="Found a bug? Have an idea? Let us know..." style="resize:none;margin-bottom:12px"></textarea>
  <button class="btn btn-primary" onclick="submitFeedback()">Send Feedback →</button>
  <div id="fbStatus" style="text-align:center;font-size:13px;color:var(--muted);margin-top:10px"></div>
</div>

<script>
// ⚙️ CONFIGURATION
const CFG = {
  // PASTE YOUR PUBLISHED GOOGLE APPS SCRIPT WEB APP URL HERE:
  GAS_URL: 'https://script.google.com/macros/s/AKfycbwrD8eXkPmLRGeLSZ0cQNayDoErSMjFrvhfWaNMduqC3upKJhRbPJ7sEYeJED-fcWg/exec',  
  GUMROAD: {
    PACK10:  'https://carzmood.gumroad.com/l/tokens10',
    PACK50:  'https://carzmood.gumroad.com/l/tokens50',
    PACK200: 'https://carzmood.gumroad.com/l/tokens200',
  },
  FREE_TOKENS: 3
};

const MAKES =["ACURA","ALFA ROMEO","AUDI","BMW","BUICK","CADILLAC","CHEVROLET","CHRYSLER","DODGE","FORD","GMC","HONDA","HYUNDAI","INFINITI","JAGUAR","JEEP","KIA","LAND ROVER","LEXUS","LINCOLN","MAZDA","MERCEDES-BENZ","MINI","MITSUBISHI","NISSAN","PONTIAC","PORSCHE","RAM","SATURN","SCION","SUBARU","SUZUKI","TESLA","TOYOTA","VOLKSWAGEN","VOLVO"];
const YEARS = Array.from({length:38},(_,i)=>2026-i);

const TERM_LINES =[
  "Bypassing standard dealership filters...",
  "Connecting to global consensus algorithms...",
  "Scraping worldwide mechanic forums & databases...",
  "Running keyword frequency analysis (Rust, Transmission, etc)...",
  "Checking local NHTSA / DOT federal safety recalls...",
  "Analyzing common failure modes for this exact model...",
  "Generating model-specific critical inspection checklist...",
  "Calculating depreciation curve and fair market value...",
  "Executing buy / no-buy consensus logic...",
  "Analysis complete — building your verdict..."
];

let S = {
  phase: 'splash', authMode: 'login', user: null,
  car: {year:'',make:'',model:''}, region: 'Global', models: [],
  nhtsa: {complaints:[],recalls:[],tsbs:[]},
  scraperData: null, checklist: [], answers: {}, verdict: null, termLines:[], authErr: '', authLoading: false, showTokenModal: false
};

const $ = id => document.getElementById(id);
const esc = s => encodeURIComponent(s);
const fmtUSD = n => '$' + n.toLocaleString('en-US');

async function hashPass(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('CM2025_' + p));
  return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function getUserIP() {
  try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; }
  catch { return 'unknown'; }
}

async function gasPost(data) {
  try {
    const r = await fetch(CFG.GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return await r.json();
  } catch(e) { return {ok: false, error: 'Network error — check your connection'}; }
}

// 🌐 Auth Logic
async function handleAuth() {
  const email = ($('authEmail')?.value||'').trim();
  const pass  = ($('authPass')?.value ||'');
  S.authErr = '';

  if (!email || !pass) { S.authErr = 'Fill in all fields.'; render(); return; }
  if (S.authMode === 'signup' && pass !== $('authPass2')?.value) { S.authErr = 'Passwords do not match.'; render(); return; }

  S.authLoading = true; render();
  const hash = await hashPass(pass);
  const ip = await getUserIP();
  
  const res = await gasPost({ action: S.authMode, email: email.toLowerCase(), hash, ip });
  S.authLoading = false;
  
  if (!res.ok) { S.authErr = res.error || 'Authentication failed.'; render(); return; }
  S.user = {email: email.toLowerCase(), tokens: res.tokens, hash};
  localStorage.setItem('cm_user', JSON.stringify(S.user));
  S.phase = 'home'; render();
}

function logout() {
  localStorage.removeItem('cm_user'); S.user = null; S.phase = 'auth'; render();
}

// 🌐 Core Application Logic
async function startAnalysis() {
  if (S.user.tokens <= 0) { S.showTokenModal = true; render(); return; }
  
  // Deduct token locally & backend
  const res = await gasPost({action:'deduct', email: S.user.email, hash: S.user.hash});
  if(!res.ok) { S.showTokenModal = true; render(); return; }
  S.user.tokens = res.tokens; localStorage.setItem('cm_user', JSON.stringify(S.user));

  S.phase = 'loading'; S.termLines =[]; S.answers = {}; render();

  // Terminal Animation
  let delay = 0;
  TERM_LINES.forEach((msg, i) => {
    setTimeout(() => {
      S.termLines.push(msg);
      const tb = $('termBox'); if (tb) { tb.innerHTML = buildTermHTML(); tb.scrollTop = tb.scrollHeight; }
    }, delay);
    delay += (i < 4 ? 600 : 850);
  });

  // Parallel Fetch: Local Recalls + Global Scraper
  const query = `${S.car.year} ${S.car.make} ${S.car.model} reliability issues complaints`;
  const[nhtsaRes, scrapeRes] = await Promise.all([
    fetch(`https://api.nhtsa.gov/recalls/recallsByVehicle?make=${esc(S.car.make)}&model=${esc(S.car.model)}&modelYear=${S.car.year}`).then(r=>r.json()).catch(()=>({Results:[]})),
    gasPost({action: 'scrape', query: query})
  ]);

  S.nhtsa.recalls = nhtsaRes.Results ||[];
  S.scraperData = scrapeRes.ok ? scrapeRes.data : {rust:0, transmission:0, engine:0, brakes:0, electrical:0};
  
  buildChecklist();
  setTimeout(() => { S.phase = 'checklist'; render(); }, delay + 600);
}

function buildChecklist() {
  let items =[
    {id:'doc1', cat:'Documentation', label:'Title is CLEAN — not salvage, rebuilt, flood, or lemon title', critical:true},
    {id:'doc2', cat:'Documentation', label:'VIN matches on dashboard, title document, AND door jamb sticker', critical:true}
  ];

  if (S.nhtsa.recalls.length > 0) {
    items.push({id:'recall1', cat:'Open Recalls ⚠️', critical:true, badge:`${S.nhtsa.recalls.length} federal recalls exist`, label:`Confirm that ALL government safety recalls have been fully repaired by a dealer`});
  }

  // Global Scraper logic injection
  const s = S.scraperData;
  if (s.engine > 2) items.push({id:'eng1', cat:'Engine & Oil', critical:true, badge:'High Web Consensus', label:'Engine idles smoothly with no knocking, ticking, or misfires'}, {id:'eng2', cat:'Engine & Oil', critical:false, label:'No oil leaks visible under the car or on the engine block'});
  if (s.transmission > 2) items.push({id:'trans1', cat:'Transmission', critical:true, badge:'High Web Consensus', label:'Shifts smoothly through all gears with zero hesitation or slip. Fluid is pink, not black.'});
  if (s.rust > 1) items.push({id:'rust1', cat:'Rust & Body', critical:true, badge:'Known Rust Issues', label:'Check frame, subframe, and suspension mounting points for severe rust'});
  if (s.electrical > 2) items.push({id:'elec1', cat:'Electrical', critical:false, label:'Check that ALL warning lights turn OFF after the engine fully warms up'});

  // Defaults if nothing pops
  if(items.length < 5) items.push(
    {id:'b1', cat:'Brakes', critical:false, label:'No squealing, grinding, or pulsing vibration when braking'},
    {id:'t1', cat:'Suspension', critical:false, label:'Tires show even wear — no feathering, cupping, or bald spots'}
  );

  S.checklist = items;
}

// 🎨 Render Engine
function render() {
  const a = $('app');
  $('fbBubble').style.display = (S.phase === 'splash' || S.phase === 'auth') ? 'none' : 'flex';
  
  if (S.phase === 'auth') a.innerHTML = renderAuth();
  else if (S.phase === 'home') a.innerHTML = renderHome();
  else if (S.phase === 'input') a.innerHTML = renderInput();
  else if (S.phase === 'loading') a.innerHTML = renderLoading();
  else if (S.phase === 'checklist') a.innerHTML = renderChecklist();
  else if (S.phase === 'verdict') a.innerHTML = renderVerdict();

  const mo = document.querySelector('.modal-overlay'); if (mo) mo.remove();
  if (S.showTokenModal) renderTokenModal();
}

function renderAuth() {
  return `<div class="auth-wrap fade-up" style="padding:32px 20px">
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo-ring" style="margin:0 auto 10px;width:60px;height:60px;font-size:24px">🛡️</div>
      <div style="font-size:26px;font-weight:800;color:var(--teal)">DealerDefense</div>
    </div>
    <div class="auth-tab">
      <button class="${S.authMode==='login'?'active':''}" onclick="S.authMode='login';render()">Sign In</button>
      <button class="${S.authMode==='signup'?'active':''}" onclick="S.authMode='signup';render()">Create Account</button>
    </div>
    ${S.authErr ? `<div class="err-box" style="margin-bottom:16px">${S.authErr}</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="lbl">Email address</label><input id="authEmail" class="inp" type="email" placeholder="you@example.com"></div>
      <div><label class="lbl">Password</label><input id="authPass" class="inp" type="password" placeholder="Password"></div>
      ${S.authMode==='signup'?`<div><label class="lbl">Confirm Password</label><input id="authPass2" class="inp" type="password" placeholder="Repeat password"></div>`:''}
    </div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="handleAuth()" ${S.authLoading?'disabled':''}>
      ${S.authLoading ? 'Please wait...' : (S.authMode==='login' ? 'Sign In →' : `Get ${CFG.FREE_TOKENS} Free Searches →`)}
    </button>
  </div>`;
}

function renderHome() {
  return `<div style="padding:0 0 80px">
    <div id="topBar">
      <div style="font-size:14px;font-weight:700;color:var(--teal)">🛡️ DealerDefense</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="token-badge" onclick="S.showTokenModal=true;render()">🎯 ${S.user.tokens} tokens</div>
        <button onclick="logout()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer">OUT</button>
      </div>
    </div>
    <div class="hero-wrap fade-up" style="padding:24px 20px 0">
      <h1 style="font-size:26px;font-weight:800;line-height:1.2;margin-bottom:8px">Never get ripped off buying a used car.</h1>
      <p style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px">Our Oracle scrapes the entire internet and federal databases to generate a real-time inspection checklist and fair price.</p>
      
      <button class="btn btn-primary" style="font-size:18px;padding:20px;margin-bottom:20px" onclick="S.phase='input';render()">🔍 Start Analysis</button>

      <div class="card" style="border-color:var(--teal)40">
        <div style="font-size:11px;font-family:var(--font-mono);color:var(--muted);letter-spacing:2px;margin-bottom:10px">📚 THE CARZMOOD ARSENAL</div>
        ${[['$10K Defense Manual','$149','https://carzmood.gumroad.com/l/defensemanualforcarbuyers'],['2026 Cheat Sheet','$29','https://carzmood.gumroad.com/l/2026cheatsheet']].map(([t,p,url])=>`<a href="${url}" target="_blank" style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border);text-decoration:none">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${t}</div>
          <div style="font-size:14px;font-weight:900;color:var(--teal)">${p} →</div>
        </a>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderInput() {
  setTimeout(() => {
    // Magic real-time Zero-Refresh listeners
    const checkReady = () => {
      const y = $('selYear').value, m = $('selMake').value, mod = $('inMod').value.trim();
      const btn = $('runBtn');
      if (y && m && mod) { btn.disabled = false; btn.className = 'btn btn-primary'; btn.textContent = '🔍 Run Consensus Scraper (1 token)'; S.car = {year:y, make:m, model:mod.toUpperCase()}; }
      else { btn.disabled = true; btn.className = 'btn'; btn.textContent = 'Fill in all fields above'; }
    };
    $('selYear').addEventListener('change', checkReady);
    $('selMake').addEventListener('change', checkReady);
    $('inMod').addEventListener('input', checkReady);
    $('selRegion').addEventListener('change', e => S.region = e.target.value);
  }, 100);

  return `
  <div id="topBar">
    <button class="back-btn" onclick="S.phase='home';render()">← Back</button>
    <div class="token-badge" onclick="S.showTokenModal=true;render()">🎯 ${S.user.tokens} tokens</div>
  </div>
  <div style="padding:20px" class="fade-up">
    <h2 style="font-size:22px;font-weight:800;margin-bottom:16px">Vehicle Identification</h2>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="lbl">Search Region</label><select id="selRegion" class="inp"><option>Global</option><option>US</option><option>UK</option><option>AU</option></select></div>
      <div><label class="lbl">Year</label><select id="selYear" class="inp"><option value="">Select year...</option>${YEARS.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div>
      <div><label class="lbl">Make</label><select id="selMake" class="inp"><option value="">Select make...</option>${MAKES.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
      <div><label class="lbl">Model</label><input id="inMod" class="inp" placeholder="e.g. Civic, F-150, Camry"></div>
      <button id="runBtn" class="btn" disabled style="font-size:17px;padding:20px;margin-top:10px" onclick="startAnalysis()">Fill in all fields above</button>
    </div>
  </div>`;
}

function renderLoading() {
  return `<div class="fade-in" style="padding:28px 20px;display:flex;flex-direction:column;height:100vh">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:18px;font-weight:800;color:var(--teal)">Oracle Scraper Active</div>
      <div style="font-size:13px;font-family:var(--font-mono);color:var(--muted);margin-top:4px">${S.car.year} ${S.car.make} ${S.car.model}</div>
    </div>
    <div id="termBox" class="terminal"><div style="color:#166534;margin-bottom:12px;font-size:11px">DealerDefense™ Global Aggregator</div>${buildTermHTML()}</div>
  </div>`;
}
function buildTermHTML() {
  return S.termLines.map((l, i) => `<div class="term-line"><span class="term-prompt">&gt;&gt;</span><span class="term-text${i===S.termLines.length-1&&l.includes('complete')?' complete':''}">${l}${i===S.termLines.length-1?`<span class="term-cursor">█</span>`:''}</span></div>`).join('');
}

function renderChecklist() {
  const done = Object.keys(S.answers).length, total = S.checklist.length, pct = Math.round(done/total*100);
  setTimeout(() => {
    document.querySelectorAll('.check-btn').forEach(b => b.onclick = () => { S.answers[b.dataset.id] = b.dataset.val; renderChecklist(); });
  }, 50);

  return `<div class="fade-in">
    <div id="topBar" style="display:block">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <button class="back-btn" onclick="S.phase='input';render()">← Back</button>
        <div style="font-size:20px;font-weight:800;color:var(--teal);font-family:var(--font-mono)">${done}/${total}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div style="padding:20px 20px 100px">
      ${S.checklist.map(i => `<div class="check-card ${S.answers[i.id]==='pass'?'pass':S.answers[i.id]==='fail'?'fail':''}">
        ${i.badge ? `<div style="font-size:11px;font-family:var(--font-mono);color:var(--red);font-weight:700;margin-bottom:8px">⚠ ${i.badge}</div>` : ''}
        <div style="font-size:14px;line-height:1.5;margin-bottom:12px"><strong>${i.critical?'[CRITICAL] ':''}</strong>${i.label}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="check-btn ${S.answers[i.id]==='pass'?'pass-active':''}" data-id="${i.id}" data-val="pass">✓ Pass</button>
          <button class="check-btn ${S.answers[i.id]==='fail'?'fail-active':''}" data-id="${i.id}" data-val="fail">✗ Fail</button>
        </div>
      </div>`).join('')}
      <button class="btn ${done===total?'btn-primary':''}" ${done!==total?'disabled':''} style="padding:20px;margin-top:10px" onclick="calcVerdict()">Get Verdict →</button>
    </div>
  </div>`;
}

function calcVerdict() {
  const fails = Object.values(S.answers).filter(v=>v==='fail').length;
  const critFails = S.checklist.filter(i=>i.critical && S.answers[i.id]==='fail').length;
  let score = 100 - (fails * 15) - (critFails * 30); if(score<0) score=0;
  S.verdict = { score, buy: score>=75&&critFails===0, neg: score>=40&&critFails<=1, fails, critFails };
  S.phase = 'verdict'; render();
}

function renderVerdict() {
  const v = S.verdict, vc = v.buy?'var(--green)':v.neg?'var(--amber)':'var(--red)';
  return `<div class="fade-up">
    <div id="topBar"><button class="back-btn" onclick="S.phase='checklist';render()">← Back</button></div>
    <div style="padding:20px 20px 80px">
      <div class="card" style="border-color:${vc}80;text-align:center;padding:30px 20px">
        <div style="font-size:38px;font-weight:900;color:${vc};margin-bottom:10px">${v.buy?'✅ BUY':v.neg?'⚠️ NEGOTIATE':'🚫 WALK AWAY'}</div>
        <div style="font-size:14px;color:var(--text2)">${v.buy?'Clean bill of health. Proceed.':v.neg?'Use the '+v.fails+' failed checks to lower the price.':'Critical issues found. Do not buy.'}</div>
        <div style="font-size:64px;font-weight:900;color:${vc};margin-top:20px;font-family:var(--font-mono)">${v.score}</div>
        <div style="font-size:12px;color:var(--muted)">ORACLE SCORE</div>
      </div>
      <button class="btn btn-primary" style="margin-top:20px" onclick="S.phase='input';render()">Scan Another Car</button>
    </div>
  </div>`;
}

function renderTokenModal() {
  const url = `${CFG.GUMROAD.PACK10}?email=${esc(S.user.email)}`;
  const ol = document.createElement('div'); ol.className='modal-overlay';
  ol.onclick=e=>{if(e.target===ol){S.showTokenModal=false;render();}};
  ol.innerHTML=`<div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="font-size:20px;font-weight:800">🎯 Top Up Tokens</div><button onclick="S.showTokenModal=false;render()" style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer">×</button></div>
    <div class="pack-card featured" onclick="window.GumroadOverlay ? GumroadOverlay.show('${url}') : window.open('${url}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:800;font-size:16px">Starter Pack</div><div style="font-size:13px;color:var(--text2)">10 Searches</div></div>
        <div style="font-size:22px;font-weight:900;color:var(--teal)">$2.99</div>
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:10px">Tokens are automatically credited to ${S.user.email} after purchase.</p>
  </div>`;
  document.body.appendChild(ol);
}

// Feedback
function openFeedback() { $('fbPanel').classList.add('open'); $('fbOverlay').classList.add('open'); }
function closeFeedback() { $('fbPanel').classList.remove('open'); $('fbOverlay').classList.remove('open'); }
async function submitFeedback() {
  const msg = $('fbText').value; if(!msg) return;
  $('fbStatus').textContent = 'Sending...';
  await gasPost({action:'feedback', email: S.user?.email||'Anonymous', message: msg});
  $('fbStatus').textContent = 'Sent! Thank you.'; $('fbText').value=''; setTimeout(closeFeedback, 2000);
}
$('fbBubble').onclick = openFeedback;

// Boot
window.onload = () => {
  const saved = localStorage.getItem('cm_user');
  if (saved) { S.user = JSON.parse(saved); S.phase = 'home'; } else { S.phase = 'auth'; }
  setTimeout(()=> { $('splash').style.opacity = '0'; setTimeout(()=>$('splash').style.display='none', 500); render(); }, 1500);
};
</script>
</body>
</html>
